<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>عبادي XO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<style>
:root{--x:#ff3355;--o:#00d4ff;--bg:#03030a;--gold:#ffd700;--green:#00ff88;--panel:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--fa:'Cairo',sans-serif;--fe:'Rajdhani',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:var(--fa);position:fixed;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,255,.025) 40px),
             repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,255,.025) 40px);}
.scr{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;
  padding:max(16px,env(safe-area-inset-top,16px)) 16px max(16px,env(safe-area-inset-bottom,16px));overflow-y:auto;}
.scr.on{display:flex;animation:scr-in .3s ease both;}
@keyframes scr-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(135deg,rgba(0,212,255,.06),rgba(0,0,0,.5));backdrop-filter:blur(20px);
  border:1px solid rgba(0,212,255,.15);border-radius:clamp(18px,5vw,26px);
  padding:clamp(20px,5vw,30px) clamp(16px,5vw,26px);width:100%;max-width:min(400px,96vw);}
.inp{width:100%;padding:clamp(11px,3vw,14px) 16px;border-radius:13px;border:1px solid var(--border);
  background:rgba(0,0,0,.5);color:#fff;margin-bottom:10px;text-align:center;outline:none;
  font-size:1rem;font-family:var(--fa);transition:border-color .2s;}
.inp:focus{border-color:var(--o);}
.btn{width:100%;padding:clamp(11px,3vw,13px);border-radius:13px;border:none;font-weight:900;cursor:pointer;
  transition:all .18s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--fa);font-size:clamp(.88rem,4vw,1rem);}
.btn:active:not(:disabled){transform:scale(.97);}
.btn:disabled{cursor:not-allowed;opacity:.4;}
.btn-cyan{background:linear-gradient(135deg,#00c8d4,#0088cc);color:#000;box-shadow:0 4px 18px rgba(0,200,212,.3);}
.btn-x{background:linear-gradient(135deg,#cc1133,#ff3355);color:#fff;box-shadow:0 4px 18px rgba(255,50,85,.3);}
.btn-ghost{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7);border:1px solid var(--border);}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0;opacity:.2;font-size:.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#fff;}
/* Battle */
#scnBattle{padding:8px 14px;justify-content:flex-start;gap:6px;}
.mhdr{width:100%;max-width:min(360px,92vw);display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:13px;flex-shrink:0;}
.pside{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:65px;}
.psym{font-family:var(--fe);font-size:1.4rem;font-weight:700;}
.pnhdr{font-size:.56rem;opacity:.65;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.tbadge{font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:50px;border:1px solid;transition:all .25s;}
.tx{background:rgba(255,50,85,.15);border-color:rgba(255,50,85,.4);color:var(--x);}
.to{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.4);color:var(--o);}
.sbar{width:100%;max-width:min(360px,92vw);display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:rgba(0,0,0,.3);border-radius:12px;border:1px solid var(--border);flex-shrink:0;}
.snum{font-family:var(--fe);font-size:1.4rem;font-weight:700;}
.slbl{font-size:.52rem;opacity:.35;letter-spacing:2px;}
/* Board */
.bwrap{width:100%;max-width:min(340px,90vw);margin:0 auto;flex-shrink:0;}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,9px);padding:clamp(10px,3vw,14px);
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:18px;}
.cell{aspect-ratio:1;border-radius:clamp(10px,3vw,15px);background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;
  font-family:var(--fe);font-size:clamp(1.8rem,10vw,2.8rem);font-weight:700;cursor:pointer;
  transition:all .15s;user-select:none;}
.cell:active{transform:scale(.87);}
.cell.taken{cursor:default;}
.cell.cx{color:var(--x);background:rgba(255,50,85,.1);border-color:rgba(255,50,85,.3);
  text-shadow:0 0 14px var(--x);animation:cpop .22s ease;}
.cell.co{color:var(--o);background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.3);
  text-shadow:0 0 14px var(--o);animation:cpop .22s ease;}
.cell.win{animation:wf .55s ease infinite alternate;}
@keyframes cpop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes wf{0%{filter:brightness(1)}100%{filter:brightness(2.2);box-shadow:0 0 18px currentColor;}}
/* Overlays */
#resOverlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);
  display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.remi{font-size:4rem;margin-bottom:10px;}
.rtit{font-size:clamp(1.3rem,7vw,2rem);font-weight:900;margin-bottom:6px;}
.rsub{font-size:.8rem;opacity:.5;margin-bottom:6px;}
#rCountdown{font-family:var(--fe);font-size:2.5rem;font-weight:700;color:var(--o);min-height:40px;margin-bottom:12px;}
#diffModal{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.dcard{background:linear-gradient(135deg,rgba(0,212,255,.07),rgba(0,0,0,.6));border:1px solid rgba(0,212,255,.2);
  border-radius:22px;padding:26px 22px;width:100%;max-width:300px;text-align:center;}
.dbtn{width:100%;padding:12px;border-radius:13px;border:1px solid;margin-bottom:9px;cursor:pointer;
  font-family:var(--fa);font-weight:700;font-size:.88rem;background:rgba(0,0,0,.4);color:#fff;
  display:flex;align-items:center;gap:10px;transition:all .16s;}
.dbtn:hover{transform:translateY(-1px);}
.de{border-color:rgba(0,255,136,.4);}.dm{border-color:rgba(255,200,0,.4);}.dh{border-color:rgba(255,50,85,.4);}
/* Settings */
#settBtn{position:fixed;top:12px;right:12px;z-index:9998;width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(10px);
  color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#settBtn:hover{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.35);}
#settPanel{position:fixed;top:58px;right:12px;z-index:9997;background:rgba(5,5,20,.97);
  border:1px solid rgba(0,212,255,.2);backdrop-filter:blur(20px);border-radius:18px;padding:12px;
  width:190px;display:none;flex-direction:column;gap:7px;box-shadow:0 10px 40px rgba(0,0,0,.6);}
.sp-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:11px;
  border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);cursor:pointer;
  font-family:var(--fa);color:#fff;font-size:.85rem;font-weight:600;width:100%;text-align:right;transition:all .18s;}
.sp-btn:hover{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.25);}
/* AI */
#aiThink{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);
  border:1px solid rgba(0,212,255,.3);border-radius:50px;padding:8px 18px;font-size:.76rem;color:var(--o);display:none;z-index:200;}
/* Particles */
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fp linear infinite;}
@keyframes fp{0%{transform:translateY(100vh);opacity:0}10%{opacity:.6}90%{opacity:.2}100%{transform:translateY(-10vh);opacity:0}}
/* Winner */
.trophy{font-size:5rem;animation:tb 1s ease infinite alternate;filter:drop-shadow(0 0 25px var(--gold));}
@keyframes tb{from{transform:translateY(0)}to{transform:translateY(-10px)}}
::-webkit-scrollbar{width:2px;height:2px;}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px;}
</style>
</head>
<body>
<div id="aiThink">🤖 يفكر...</div>
<button id="settBtn" onclick="toggleSett()">⚙️</button>
<div id="settPanel">
  <div style="font-size:.58rem;letter-spacing:3px;opacity:.3;text-align:center;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06);">الإعدادات</div>
  <button class="sp-btn" onclick="toggleMusic()"><span id="musicIco">🎵</span><span id="musicLbl">إيقاف الموسيقى</span></button>
  <div style="height:1px;background:rgba(255,255,255,.06);"></div>
  <button class="sp-btn" onclick="confirmLeave()"><span>🚪</span><span style="color:#ff6677;">مغادرة</span></button>
</div>

<!-- ══ LOGIN ══ -->
<div id="scnLogin" class="scr on">
<div class="card">
  <div style="text-align:center;margin-bottom:16px;">
    <div style="font-size:.6rem;opacity:.25;letter-spacing:4px;margin-bottom:3px;">عبادي</div>
    <div style="font-size:clamp(3rem,14vw,5rem);font-weight:700;line-height:1;font-family:var(--fe);">
      <span style="color:var(--x);text-shadow:0 0 20px var(--x);">X</span><span style="color:var(--o);text-shadow:0 0 20px var(--o);">O</span>
    </div>
    <div style="font-size:.65rem;opacity:.3;letter-spacing:3px;margin-top:3px;">الملحمي</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:.68rem;opacity:.6;">
      <div id="connDot" style="width:7px;height:7px;border-radius:50%;background:#888;transition:background .3s;"></div>
      <span id="connTxt">جاري الاتصال...</span>
      <span id="savedBadge" style="display:none;background:rgba(0,255,136,.12);border:1px solid rgba(0,255,136,.25);border-radius:50px;padding:2px 10px;color:#00ff88;font-size:.65rem;">💾 حساب محفوظ</span>
    </div>
  </div>
  <div id="loginErr" style="display:none;color:#ff6677;font-size:.8rem;text-align:center;padding:8px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,.1);"></div>
  <div style="position:relative;width:100%;margin-bottom:5px;">
    <input class="inp" id="uName" type="text" placeholder="🎖️ اسمك في الميدان" maxlength="16" autocomplete="off"
      style="margin-bottom:0;padding-left:44px;padding-right:80px;text-align:right;direction:rtl;" oninput="onNameInput(this.value)">
    <div id="nameIco" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;"></div>
    <button id="chgBtn" onclick="changeName()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(255,255,255,.6);font-size:.65rem;padding:4px 8px;cursor:pointer;font-family:var(--fa);">تغيير</button>
  </div>
  <div id="nameSt" style="font-size:.75rem;text-align:center;min-height:18px;margin-bottom:10px;transition:all .3s;"></div>
  <button class="btn btn-cyan" id="enterBtn" onclick="enterGame()" disabled>🎮 دخول إلى الميدان</button>
  <button class="btn btn-ghost" style="opacity:.5;font-size:.8rem;margin-top:0;" onclick="goBack()">← عبادي GAMES</button>
</div>
</div>

<!-- ══ HOME (اختيار وضع اللعب) ══ -->
<div id="scnHome" class="scr">
<div class="card">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <button onclick="show('scnLogin')" style="background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:9px;width:34px;height:34px;color:#fff;cursor:pointer;font-size:.9rem;flex-shrink:0;">←</button>
    <div>
      <div style="font-size:.58rem;opacity:.35;letter-spacing:2px;">مرحباً</div>
      <div style="font-weight:900;font-size:1rem;" id="homeName">—</div>
    </div>
    <div style="margin-right:auto;font-size:1.4rem;" id="homeAv">🥷</div>
  </div>
  <div id="homeErr" style="display:none;color:#ff6677;font-size:.78rem;text-align:center;padding:7px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,.1);"></div>
  <button class="btn btn-x" onclick="createGame()">⚔️ إنشاء لعبة جديدة</button>
  <button class="btn btn-ghost" onclick="openDiff()">🤖 ضد الذكاء الاصطناعي</button>
  <div class="divider">أو انضم للعبة</div>
  <div style="position:relative;width:100%;margin-bottom:5px;">
    <input class="inp" id="gCode" placeholder="🔑 كود اللعبة" maxlength="6"
      style="letter-spacing:4px;text-transform:uppercase;margin-bottom:0;padding-left:42px;" autocomplete="off" oninput="onCodeInput(this.value)">
    <div id="codeIco" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;"></div>
  </div>
  <div id="codeSt" style="font-size:.72rem;text-align:center;min-height:16px;margin-bottom:8px;transition:all .2s;"></div>
  <button class="btn btn-ghost" id="joinBtn" onclick="joinGame()" disabled>🚪 انضمام</button>
</div>
</div>

<!-- ══ WAITING (بانتظار الخصم) ══ -->
<div id="scnWait" class="scr">
<div class="card" style="text-align:center;">
  <div style="font-size:2.5rem;margin-bottom:12px;animation:tb 1s ease infinite alternate;">⏳</div>
  <div style="font-weight:900;font-size:1.1rem;margin-bottom:6px;">في انتظار الخصم...</div>
  <div style="font-size:.75rem;opacity:.45;margin-bottom:16px;">شارك الكود مع صديقك</div>
  <div style="font-family:var(--fe);font-size:2.5rem;font-weight:700;color:var(--o);letter-spacing:8px;margin-bottom:16px;" id="waitCode">----</div>
  <button class="btn btn-ghost" onclick="copyCode()">📋 نسخ الكود</button>
  <button class="btn btn-ghost" style="opacity:.5;font-size:.8rem;margin-top:0;" onclick="cancelWait()">← إلغاء</button>
</div>
</div>

<!-- ══ BATTLE ══ -->
<div id="scnBattle" class="scr">
  <div class="mhdr" style="max-width:min(360px,92vw);">
    <div class="pside"><div class="psym" style="color:var(--x);">X</div><div class="pnhdr" id="bP1">—</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div style="font-family:var(--fe);font-size:.8rem;font-weight:700;opacity:.35;">VS</div>
      <div class="tbadge tx" id="turnBadge">دور X</div>
    </div>
    <div class="pside"><div class="psym" style="color:var(--o);">O</div><div class="pnhdr" id="bP2">—</div></div>
  </div>
  <div class="sbar" style="max-width:min(360px,92vw);">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="snum" id="scX" style="color:var(--x);">0</div><div class="slbl">X</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div style="font-size:.62rem;opacity:.45;" id="rnLabel">جولة 1</div><div class="slbl">ROUND</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="snum" id="scO" style="color:var(--o);">0</div><div class="slbl">O</div>
    </div>
  </div>
  <div class="bwrap"><div class="board" id="board"></div></div>
  <div style="font-size:.68rem;opacity:.35;margin-top:6px;text-align:center;flex-shrink:0;" id="myTurnMsg"></div>
</div>

<!-- ══ WINNER ══ -->
<div id="scnWinner" class="scr">
<div class="card" style="text-align:center;">
  <div class="trophy" id="winTrophy">🏆</div>
  <div style="font-size:.7rem;opacity:.35;letter-spacing:3px;margin:8px 0 3px;">الفائز</div>
  <div id="winName" style="font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 18px var(--gold);">—</div>
  <div id="winSub" style="font-size:.72rem;opacity:.4;margin:4px 0 18px;"></div>
  <button class="btn btn-cyan" onclick="playAgain()">⚔️ مجدداً</button>
  <button class="btn btn-ghost" style="margin-top:0;" onclick="goBack()">← عبادي GAMES</button>
</div>
</div>

<!-- ══ RESULT OVERLAY ══ -->
<div id="resOverlay">
  <div class="remi" id="rEmi">🎉</div>
  <div class="rtit" id="rTit">—</div>
  <div class="rsub" id="rSub"></div>
  <div id="rCountdown"></div>
  <button class="btn btn-cyan" style="max-width:180px;" id="rBtn" onclick="rBtnFn&&rBtnFn()">التالي ←</button>
</div>

<!-- ══ DIFFICULTY ══ -->
<div id="diffModal">
<div class="dcard">
  <div style="font-size:1rem;font-weight:900;margin-bottom:4px;">🤖 مستوى الصعوبة</div>
  <div style="font-size:.68rem;opacity:.35;margin-bottom:16px;">اختر مستوى الذكاء الاصطناعي</div>
  <button class="dbtn de" onclick="startVsAI('easy')">🟢 <div style="text-align:right;"><div>سهل</div><div style="font-size:.58rem;opacity:.45;">يخطئ أحياناً</div></div></button>
  <button class="dbtn dm" onclick="startVsAI('medium')">🟡 <div style="text-align:right;"><div>متوسط</div><div style="font-size:.58rem;opacity:.45;">ذكاء معقول</div></div></button>
  <button class="dbtn dh" onclick="startVsAI('hard')">🔴 <div style="text-align:right;"><div>صعب — Minimax</div><div style="font-size:.58rem;opacity:.45;">لا يُهزم تقريباً</div></div></button>
  <button class="btn btn-ghost" style="margin-top:4px;" onclick="document.getElementById('diffModal').style.display='none'">إلغاء</button>
</div>
</div>

<script>
/* ══ FIREBASE ══ */
firebase.initializeApp({
  apiKey:"AIzaSyBJV_Nu4eUDFhOcSR271SUj9IunkS6Mh08",
  authDomain:"game-2-ac5cc.firebaseapp.com",
  databaseURL:"https://game-2-ac5cc-default-rtdb.firebaseio.com",
  projectId:"game-2-ac5cc"
});
const db = firebase.database();

/* ══ STATE ══ */
const myId = (()=>{ let id=localStorage.getItem('xo_id'); if(!id){id='xo_'+Math.random().toString(36).substr(2,8);localStorage.setItem('xo_id',id);} return id; })();
const myAv = (()=>{ const avts=['🥷','🧙','⚔️','🛡️','🏹','⚡','🦊','🐉','💣','🔱']; let a=localStorage.getItem('xo_av'); if(!a){a=avts[Math.floor(Math.random()*avts.length)];localStorage.setItem('xo_av',a);} return a; })();
const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let myName='', gameCode='', vsAI=false, aiDiff='medium';
let p1id='', p2id='', p1nm='', p2nm='', mySymbol='';
let board=Array(9).fill(null), curTurn='X', gameOn=false;
let scores={X:0,O:0}, roundN=1;
let gameRef=null, nameTimer=null, codeTimer=null, codeOk=false;
let autoTimer=null, rBtnFn=null, settOpen=false;
let musicOn=localStorage.getItem('xo_music')!=='off', audioCtx=null, masterGain=null, bgNodes=[];

/* ══ PARTICLES ══ */
for(let i=0;i<10;i++){const d=document.createElement('div');d.className='pt';d.style.cssText=`left:${Math.random()*100}vw;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:${Math.random()>.5?'rgba(0,212,255,.35)':'rgba(255,50,85,.3)'};animation-duration:${5+Math.random()*7}s;animation-delay:-${Math.random()*7}s;`;document.body.appendChild(d);}

/* ══ CONNECTION ══ */
db.ref('.info/connected').on('value',s=>{
  const dot=document.getElementById('connDot'), txt=document.getElementById('connTxt');
  if(s.val()){dot.style.background='#00ff88';txt.textContent='متصل';}
  else{dot.style.background='#ff5566';txt.textContent='غير متصل';}
});

/* ══ AUTO-FILL ══ */
const sN=localStorage.getItem('xo_name');
if(sN){
  myName=sN; document.getElementById('uName').value=sN;
  document.getElementById('savedBadge').style.display='inline-flex';

function createGame(){

function joinGame(){
  if(!codeOk)return;

/* ══ MATCH START ══ */
function startMatch(iAmp1,data){
  p1id=data.p1;p2id=data.p2;
  p1nm=data.p1name||'?';p2nm=data.p2name||'?';
  mySymbol=iAmp1?'X':'O';
  scores={X:0,O:0};roundN=1;
  buildBoard();show('scnBattle');
  document.getElementById('bP1').textContent=p1nm;
  document.getElementById('bP2').textContent=p2nm;
  document.getElementById('scX').textContent=0;
  document.getElementById('scO').textContent=0;
  document.getElementById('rnLabel').textContent='جولة 1';
  board=Array(9).fill(null);curTurn='X';gameOn=false;
  if(iAmp1){
    const empty={};for(let i=0;i<9;i++)empty[i]='_';
    db.ref(`xo3/${gameCode}/board`).set({cells:empty,turn:'X',round:1,sx:0,so:0});
  }
  if(musicOn)startMusic();
  setTimeout(()=>{gameOn=true;listenBoard();},500);
  updateTurnUI();
  document.getElementById('myTurnMsg').textContent=iAmp1?'🎯 دورك!':'انتظر دورك...';

/* ══ BOARD LISTEN ══ */
function listenBoard(){
  if(gameRef){gameRef.off();gameRef=null;}
  gameRef=db.ref(`xo3/${gameCode}/board`);
  gameRef.on('value',snap=>{
    const md=snap.val();if(!md)return;
    // انتهاء اللعبة
    if(md.winner!==undefined){gameRef.off();gameRef=null;onMatchEnd(md.winner);return;}
    // جولة جديدة
    const newRound=(md.round||1);
    if(newRound!==roundN){
      roundN=newRound;scores={X:md.sx||0,O:md.so||0};
      document.getElementById('scX').textContent=scores.X;
      document.getElementById('scO').textContent=scores.O;
      document.getElementById('rnLabel').textContent='جولة '+roundN;
      board=normBoard(md.cells);curTurn=md.turn||'X';
      renderBoard();updateTurnUI();
      const mt=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
      document.getElementById('myTurnMsg').textContent=mt?'🎯 دورك!':'انتظر دورك...';
      document.querySelectorAll('.cell').forEach(c=>c.classList.remove('win'));
      gameOn=true;return;
    }
    const nb=normBoard(md.cells);const nt=md.turn||'X';
    const chg=nb.some((v,i)=>v!==board[i])||nt!==curTurn;
    if(!chg&&gameOn)return;
    board=nb;curTurn=nt;
    renderBoard();updateTurnUI();
    const mt=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
    document.getElementById('myTurnMsg').textContent=mt?'🎯 دورك!':'انتظر دورك...';
    gameOn=true;
    const w=checkWin(board);
    const filled=board.filter(v=>v!==null).length;
    if(w){gameOn=false;if(gameRef){gameRef.off();gameRef=null;}onRoundEnd(w);}
    else if(filled>=9){gameOn=false;if(gameRef){gameRef.off();gameRef=null;}onRoundEnd('draw');}
  });
}

/* ══ CELL CLICK ══ */
function cellClick(i){
  if(vsAI){aiCellClick(i);return;}
  if(!gameOn||board[i])return;
  const mt=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
  if(!mt)return;
  initAudio();curTurn==='X'?sfxX():sfxO();
  gameOn=false;
  const nb=[...board];nb[i]=curTurn;const nt=curTurn==='X'?'O':'X';
  const cells={};nb.forEach((v,j)=>{cells[j]=v||'_';});
  db.ref(`xo3/${gameCode}/board`).update({cells,turn:nt})
    .then(()=>{gameOn=true;}).catch(()=>{gameOn=true;});
}

/* ══ ROUND / MATCH END ══ */
function onRoundEnd(w){
  initAudio();clearTimeout(autoTimer);
  if(w==='draw'){
    sfxDraw();
    showRes('🤝','تعادل!',`جولة ${roundN+1} خلال 4 ثوانٍ...`);
    setResBtn('التالي الآن ←',()=>{clearTimer();closeRes();nextRound();});
    startCD(4,nextRound);
  }else{
    scores[w]++;document.getElementById('sc'+w).textContent=scores[w];
    const wname=w==='X'?p1nm:p2nm;
    const done=scores.X>=2||scores.O>=2||roundN>=3;
    const iWon=(w==='X'&&myId===p1id)||(w==='O'&&myId===p2id);
    iWon?sfxWin():sfxLose();
    if(done){
      const mw=scores.X>scores.O?'X':scores.O>scores.X?'O':'draw';
      showRes(w==='X'?'❌':'⭕','🏆 فاز '+wname+'!','نهاية اللعبة');
      setResBtn('النتيجة ←',()=>{clearTimer();closeRes();endMatch(mw);});
      startCD(4,()=>endMatch(mw));
    }else{
      showRes(w==='X'?'❌':'⭕','فاز '+wname+'!',`جولة ${roundN+1} خلال 4 ثوانٍ...`);
      setResBtn('التالي الآن ←',()=>{clearTimer();closeRes();nextRound();});
      startCD(4,nextRound);
    }
  }
}

function nextRound(){
  roundN++;board=Array(9).fill(null);curTurn='X';
  document.getElementById('rnLabel').textContent='جولة '+roundN;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('win'));
  gameOn=false;

  if(myId===p1id){
    const cells={};for(let i=0;i<9;i++)cells[i]='_';
    db.ref(`xo3/${gameCode}/board`).update({cells,turn:'X',round:roundN,sx:scores.X,so:scores.O})
      .then(()=>startListen()).catch(()=>startListen());
  }else{
    setTimeout(startListen,300);
  }
}

function startListen(){
  renderBoard();updateTurnUI();

function endMatch(mw){

function onMatchEnd(winnerId){
  const iWon=myId===winnerId;

/* ══ BOARD HELPERS ══ */
function normBoard(raw){return Array(9).fill(null).map((_,i)=>{const v=raw&&raw[i];return(v&&v!=='_')?v:null;});}
function buildBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  for(let i=0;i<9;i++){
    const c=document.createElement('div');c.className='cell';
    let touched=false;
    c.addEventListener('touchend',e=>{e.preventDefault();touched=true;cellClick(i);setTimeout(()=>touched=false,300);},{passive:false});
    c.addEventListener('click',()=>{if(!touched)cellClick(i);});
    b.appendChild(c);
  }
}
function renderBoard(){
  document.querySelectorAll('.cell').forEach((c,i)=>{
    const v=board[i];c.textContent=v||'';c.className='cell';
    if(v)c.classList.add('taken',v==='X'?'cx':'co');
  });
  const wl=getWinLine(board);if(wl)wl.forEach(i=>document.querySelectorAll('.cell')[i].classList.add('win'));
}
function updateTurnUI(){const b=document.getElementById('turnBadge');b.textContent='دور '+curTurn;b.className='tbadge '+(curTurn==='X'?'tx':'to');}
function checkWin(b){for(const[a,p,q]of WINS){const v=b[a];if(v&&v===b[p]&&v===b[q])return v;}return null;}
function getWinLine(b){for(const l of WINS){const v=b[l[0]];if(v&&v===b[l[1]]&&v===b[l[2]])return l;}return null;}

/* ══ VS AI ══ */
function openDiff(){document.getElementById('diffModal').style.display='flex';}
function startVsAI(diff){
  document.getElementById('diffModal').style.display='none';
  vsAI=true;aiDiff=diff;
  p1id=myId;p1nm=myName;p2id='AI';p2nm='🤖 '+{easy:'سهل',medium:'متوسط',hard:'صعب'}[diff];mySymbol='X';

function aiCellClick(i){
  if(!gameOn||board[i]||mySymbol!==curTurn)return;
  board[i]=curTurn;const placed=curTurn;curTurn=curTurn==='X'?'O':'X';
  renderBoard();updateTurnUI();initAudio();placed==='X'?sfxX():sfxO();
  const w=checkWin(board);const filled=board.filter(v=>v!==null).length;
  if(w){gameOn=false;aiOnRoundEnd(w);}else if(filled>=9){gameOn=false;aiOnRoundEnd('draw');}
  else setTimeout(aiMove,400+Math.random()*400);
}
function aiMove(){
  if(!gameOn)return;
  document.getElementById('aiThink').style.display='flex';
  setTimeout(()=>{
    document.getElementById('aiThink').style.display='none';
    const i=botMove(board,curTurn);
    if(i!==-1){
      board[i]=curTurn;const placed=curTurn;curTurn=curTurn==='X'?'O':'X';
      renderBoard();updateTurnUI();initAudio();placed==='X'?sfxX():sfxO();
      const w=checkWin(board);const filled=board.filter(v=>v!==null).length;
      if(w){gameOn=false;aiOnRoundEnd(w);}else if(filled>=9){gameOn=false;aiOnRoundEnd('draw');}
    }
  },400+Math.random()*400);
}
function aiOnRoundEnd(w){
  initAudio();clearTimeout(autoTimer);
  if(w==='draw'){
    sfxDraw();showRes('🤝','تعادل!',`جولة ${roundN+1} خلال 4 ثوانٍ...`);
    setResBtn('التالي الآن ←',()=>{clearTimer();closeRes();aiNextRound();});startCD(4,aiNextRound);
  }else{
    scores[w]++;document.getElementById('sc'+w).textContent=scores[w];
    const wname=w==='X'?p1nm:p2nm;const done=scores.X>=2||scores.O>=2||roundN>=3;
    const iWon=w===mySymbol;iWon?sfxWin():sfxLose();
    if(done){
      showRes(w==='X'?'❌':'⭕','🏆 فاز '+wname+'!','نهاية اللعبة');
      setResBtn('النتيجة ←',()=>{clearTimer();closeRes();showFinal(iWon?myName:p2nm,scores.X+' - '+scores.O);});
      startCD(4,()=>showFinal(iWon?myName:p2nm,scores.X+' - '+scores.O));
    }else{
      showRes(w==='X'?'❌':'⭕','فاز '+wname+'!',`جولة ${roundN+1} خلال 4 ثوانٍ...`);
      setResBtn('التالي الآن ←',()=>{clearTimer();closeRes();aiNextRound();});startCD(4,aiNextRound);
    }
  }
}
function aiNextRound(){
  roundN++;board=Array(9).fill(null);curTurn='X';gameOn=true;
  renderBoard();updateTurnUI();document.getElementById('rnLabel').textContent='جولة '+roundN;
  document.getElementById('myTurnMsg').textContent='🎯 دورك!';
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('win'));
}
function botMove(brd,sym){
  const emp=brd.map((v,i)=>v===null?i:null).filter(i=>i!==null);
  if(!emp.length)return -1;
  const opp=sym==='X'?'O':'X';
  if(aiDiff==='easy'&&Math.random()<.6)return emp[Math.floor(Math.random()*emp.length)];
  for(const i of emp){brd[i]=sym;if(checkWin(brd)){brd[i]=null;return i;}brd[i]=null;}
  if(aiDiff!=='hard'){for(const i of emp){brd[i]=opp;if(checkWin(brd)){brd[i]=null;return i;}brd[i]=null;}}
  if(aiDiff==='medium'&&Math.random()<.4)return emp[Math.floor(Math.random()*emp.length)];
  if(aiDiff==='hard'){
    for(const i of emp){brd[i]=opp;if(checkWin(brd)){brd[i]=null;return i;}brd[i]=null;}
    let bs=-Infinity,bm=-1;
    for(const i of emp){brd[i]=sym;const s=mm(brd,0,false,sym,opp);brd[i]=null;if(s>bs){bs=s;bm=i;}}
    return bm;
  }
  if(brd[4]===null)return 4;
  const c=[0,2,6,8].filter(i=>brd[i]===null);
  if(c.length)return c[Math.floor(Math.random()*c.length)];
  return emp[Math.floor(Math.random()*emp.length)];
}
function mm(b,d,max,ai,hu){
  const w=checkWin(b);if(w===ai)return 10-d;if(w===hu)return d-10;if(b.every(v=>v!==null))return 0;
  const sym=max?ai:hu;let best=max?-Infinity:Infinity;
  for(let i=0;i<9;i++){if(!b[i]){b[i]=sym;const s=mm(b,d+1,!max,ai,hu);b[i]=null;best=max?Math.max(best,s):Math.min(best,s);}}
  return best;
}
function playAgain(){
  if(vsAI){scores={X:0,O:0};roundN=1;board=Array(9).fill(null);curTurn='X';gameOn=true;
    renderBoard();updateTurnUI();document.getElementById('scX').textContent=0;document.getElementById('scO').textContent=0;
    document.getElementById('rnLabel').textContent='جولة 1';document.getElementById('myTurnMsg').textContent='🎯 دورك!';}
  else{gameCode='';if(gameRef){gameRef.off();gameRef=null;}show('scnHome');}
}

function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=.15;masterGain.connect(audioCtx.destination);if(musicOn)startMusic();}
document.addEventListener('click',initAudio,{once:true});document.addEventListener('touchstart',initAudio,{once:true});
function tone(freq,dur,vol=.2,type='sine',delay=0){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,audioCtx.currentTime+delay);g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+delay+.02);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+delay+dur);o.connect(g);g.connect(audioCtx.destination);o.start(audioCtx.currentTime+delay);o.stop(audioCtx.currentTime+delay+dur+.05);}
function sfxX(){tone(220,.12,.25,'sawtooth');tone(330,.08,.12,'sine',.06);}
function sfxO(){tone(528,.18,.2,'sine');tone(792,.12,.1,'sine',.05);}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>tone(f,.25,.18,'sine',i*.12));}
function sfxLose(){[392,330,262,196].forEach((f,i)=>tone(f,.2,.15,'sawtooth',i*.1));}
function sfxDraw(){tone(330,.15,.2,'triangle');tone(220,.2,.15,'triangle',.1);}
function sfxClick(){tone(660,.07,.12,'sine');}
function startMusic(){if(!audioCtx||!musicOn)return;stopMusic();const scale=[261,294,330,349,392,440,494,523];const mel=[0,2,4,5,4,2,0,2,4,7,5,4,2,4,2,0];const beat=60/72;function sched(start){if(!musicOn)return;mel.forEach((n,i)=>{const t=start+i*beat;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=scale[n]*2;g.gain.setValueAtTime(0,audioCtx.currentTime+t);g.gain.linearRampToValueAtTime(.055,audioCtx.currentTime+t+.04);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+t+beat*.7);o.connect(g);g.connect(masterGain);o.start(audioCtx.currentTime+t);o.stop(audioCtx.currentTime+t+beat);bgNodes.push(o);});const tid=setTimeout(()=>sched(0),(mel.length*beat-.1)*1000);bgNodes.push({stop:()=>clearTimeout(tid)});}sched(.1);}
function stopMusic(){bgNodes.forEach(n=>{try{n.stop?n.stop():null;}catch(e){}});bgNodes=[];}
</script>
