<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>عبادي XO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@700;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<style>
:root{
  --x:#ff3355; --o:#00d4ff; --bg:#03030a; --panel:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08); --gold:#ffd700; --green:#00ff88;
  --font-ar:'Cairo',sans-serif; --font-en:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:white;font-family:var(--font-ar);position:fixed;}

/* BG */
#bgCv{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* SCREENS */
.screen{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;
  padding:max(16px,env(safe-area-inset-top,16px)) 16px max(16px,env(safe-area-inset-bottom,16px));overflow-y:auto;}
.screen.active{display:flex;animation:scn-in 0.4s cubic-bezier(.22,1,.36,1) both;}
@keyframes scn-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CARD */
.card{
  background:linear-gradient(135deg,rgba(0,212,255,0.05),rgba(0,0,0,0.5));
  backdrop-filter:blur(20px);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:clamp(18px,5vw,28px);
  padding:clamp(20px,5vw,32px) clamp(16px,5vw,28px);
  width:100%;max-width:min(420px,96vw);
  box-shadow:0 0 60px rgba(0,212,255,0.04);
}

/* LOGO */
.xo-logo{text-align:center;margin-bottom:20px;}
.xo-logo-main{font-family:var(--font-en);font-size:clamp(3rem,14vw,5rem);font-weight:700;line-height:1;letter-spacing:4px;}
.xo-x{color:var(--x);text-shadow:0 0 20px var(--x),0 0 40px rgba(255,50,85,0.4);}
.xo-o{color:var(--o);text-shadow:0 0 20px var(--o),0 0 40px rgba(0,212,255,0.4);}

/* INPUTS / BUTTONS */
.inp{width:100%;padding:clamp(11px,3vw,14px) 16px;border-radius:14px;border:1px solid var(--border);
  background:rgba(0,0,0,0.5);color:white;margin-bottom:10px;text-align:center;outline:none;
  font-size:clamp(0.9rem,4vw,1rem);font-family:var(--font-ar);transition:border-color 0.2s;}
.inp:focus{border-color:var(--o);}
.btn{width:100%;padding:clamp(11px,3vw,14px);border-radius:14px;border:none;font-weight:900;cursor:pointer;
  transition:all 0.2s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font-ar);font-size:clamp(0.88rem,4vw,1rem);position:relative;overflow:hidden;}
.btn-x{background:linear-gradient(135deg,#cc1133,#ff3355);color:white;box-shadow:0 4px 20px rgba(255,50,85,0.3);}
.btn-o{background:linear-gradient(135deg,#0088aa,#00d4ff);color:#000;box-shadow:0 4px 20px rgba(0,212,255,0.3);}
.btn-ghost{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border:1px solid var(--border);}
.btn-gold{background:linear-gradient(135deg,#ffd700,#cc8800);color:#000;}
.divider{display:flex;align-items:center;gap:10px;margin:6px 0;opacity:0.2;font-size:0.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:white;}

/* STATUS */
.status-pill{display:inline-flex;align-items:center;gap:5px;border-radius:50px;padding:3px 12px;
  font-size:0.68rem;font-weight:700;border:1px solid;}
.sp-green{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.25);color:var(--green);}
.sp-blue{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.25);color:var(--o);}

/* ══ LOBBY ══ */
#scnLobby{padding:12px 16px;justify-content:flex-start;}
.lobby-hdr{width:100%;max-width:440px;display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;margin-bottom:10px;
  background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);border-radius:14px;}
.room-code{font-family:var(--font-en);font-size:clamp(1.1rem,5vw,1.5rem);font-weight:700;color:var(--o);letter-spacing:4px;}

/* Players grid */
.players-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:440px;margin-bottom:10px;}
.p-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:10px 6px;display:flex;flex-direction:column;align-items:center;position:relative;transition:all 0.3s;}
.p-card.ready{border-color:rgba(0,255,136,0.5);background:rgba(0,255,136,0.05);}
.p-avatar{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid rgba(255,255,255,0.08);}
.p-name{font-size:0.58rem;font-weight:700;margin-top:5px;text-align:center;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crown{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:0.85rem;filter:drop-shadow(0 0 5px var(--gold));}

/* Chat */
.chat-wrap{width:100%;max-width:440px;border-radius:14px;overflow:hidden;border:1px solid var(--border);
  margin-bottom:8px;background:rgba(0,0,0,0.3);}
#chatMsgs{height:70px;overflow-y:auto;padding:8px 10px;font-size:0.72rem;display:flex;flex-direction:column;gap:3px;}
.chat-bar{display:flex;gap:6px;padding:7px;background:rgba(255,255,255,0.02);}
.c-inp{flex:1;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:10px;
  color:white;padding:6px 10px;font-size:0.76rem;font-family:var(--font-ar);outline:none;}
.c-send{background:var(--o);border:none;border-radius:10px;width:34px;color:#000;cursor:pointer;font-size:0.8rem;}
.lobby-actions{display:flex;gap:6px;width:100%;max-width:440px;margin-bottom:6px;}

/* ══ BATTLE ══ */
#scnBattle{padding:10px 16px;justify-content:flex-start;gap:0;}

/* Match header */
.match-hdr{width:100%;max-width:440px;display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;margin-bottom:10px;
  background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:14px;flex-shrink:0;}
.player-side{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:70px;}
.player-symbol{font-family:var(--font-en);font-size:1.4rem;font-weight:700;}
.player-name-hdr{font-size:0.58rem;opacity:0.7;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.vs-badge{font-family:var(--font-en);font-size:0.85rem;font-weight:700;opacity:0.4;flex-shrink:0;}
.turn-indicator{
  font-size:0.72rem;font-weight:700;padding:4px 12px;border-radius:50px;border:1px solid;
  transition:all 0.3s;text-align:center;
}
.turn-x{background:rgba(255,50,85,0.15);border-color:rgba(255,50,85,0.4);color:var(--x);}
.turn-o{background:rgba(0,212,255,0.15);border-color:rgba(0,212,255,0.4);color:var(--o);}

/* XO BOARD */
.board-wrap{
  width:100%;max-width:min(360px,90vw);
  margin:0 auto;
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;
}
.board{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(6px,2vw,10px);
  width:100%;
  padding:clamp(10px,3vw,16px);
  background:rgba(0,0,0,0.4);
  border:1px solid var(--border);
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}
.cell{
  aspect-ratio:1;
  border-radius:clamp(10px,3vw,16px);
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-en);
  font-size:clamp(1.8rem,10vw,3rem);
  font-weight:700;
  cursor:pointer;
  transition:all 0.15s;
  position:relative;overflow:hidden;
  user-select:none;
}
.cell:hover:not(.taken){background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);transform:scale(0.96);}
.cell:active:not(.taken){transform:scale(0.88);}
.cell.taken{cursor:default;}
.cell.x{color:var(--x);background:rgba(255,50,85,0.1);border-color:rgba(255,50,85,0.3);
  text-shadow:0 0 16px var(--x);animation:cell-pop 0.25s cubic-bezier(.17,.67,.83,.67);}
.cell.o{color:var(--o);background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);
  text-shadow:0 0 16px var(--o);animation:cell-pop 0.25s cubic-bezier(.17,.67,.83,.67);}
.cell.win-cell{animation:win-flash 0.6s ease infinite alternate;}
@keyframes cell-pop{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes win-flash{0%{filter:brightness(1)}100%{filter:brightness(1.8);box-shadow:0 0 20px currentColor;}}

/* Score + round */
.score-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:8px 14px;margin-bottom:8px;
  background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid var(--border);
  flex-shrink:0;
}
.score-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.score-num{font-family:var(--font-en);font-size:1.4rem;font-weight:700;}
.score-label{font-size:0.55rem;opacity:0.4;letter-spacing:2px;}
.round-info{font-size:0.65rem;opacity:0.5;text-align:center;}

/* Tournament bracket */
#scnTournament{padding:10px 16px;justify-content:flex-start;overflow-y:auto;}
.bracket-wrap{width:100%;max-width:440px;}
.bracket-round{margin-bottom:14px;}
.bracket-title{font-size:0.6rem;letter-spacing:3px;opacity:0.3;margin-bottom:8px;text-align:center;}
.bracket-matches{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.bracket-match{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:8px 12px;display:flex;flex-direction:column;gap:4px;min-width:120px;
  font-size:0.72rem;
}
.bm-player{display:flex;align-items:center;gap:6px;padding:3px 0;}
.bm-avatar{font-size:0.9rem;}
.bm-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bm-win{color:var(--green);font-weight:900;font-size:0.65rem;}
.bm-lose{opacity:0.3;text-decoration:line-through;}
.bm-active{border-color:rgba(0,212,255,0.4);background:rgba(0,212,255,0.06);}
.bm-done.win-top .bm-player:first-child .bm-name{color:var(--green);font-weight:700;}
.bm-done.win-bottom .bm-player:last-child .bm-name{color:var(--green);font-weight:700;}

/* Result overlay */
#resultOverlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,0.88);backdrop-filter:blur(10px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;
}
.result-emoji{font-size:4rem;margin-bottom:10px;filter:drop-shadow(0 0 20px currentColor);}
.result-title{font-size:clamp(1.4rem,7vw,2rem);font-weight:900;margin-bottom:6px;}
.result-sub{font-size:0.82rem;opacity:0.6;margin-bottom:20px;}

/* AI thinking indicator */
#aiThinking{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.8);border:1px solid rgba(0,212,255,0.3);
  border-radius:50px;padding:8px 20px;font-size:0.78rem;color:var(--o);
  display:none;z-index:100;gap:8px;align-items:center;
  animation:ai-pulse 0.8s ease infinite alternate;
}
@keyframes ai-pulse{from{opacity:0.6}to{opacity:1}}

/* Misc */
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px;}

/* Difficulty modal */
#diffModal{
  position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  animation:scn-in 0.3s ease both;
}
.diff-card{
  background:linear-gradient(135deg,rgba(0,212,255,0.07),rgba(0,0,0,0.6));
  border:1px solid rgba(0,212,255,0.2);border-radius:24px;
  padding:28px 24px;width:100%;max-width:320px;text-align:center;
}
.diff-title{font-size:1.1rem;font-weight:900;margin-bottom:4px;color:white;}
.diff-sub{font-size:0.72rem;opacity:0.4;margin-bottom:20px;}
.diff-btn{
  width:100%;padding:13px;border-radius:14px;border:1px solid;
  margin-bottom:10px;cursor:pointer;font-family:var(--font-ar);font-weight:700;
  font-size:0.9rem;transition:all 0.18s;background:rgba(0,0,0,0.4);color:white;
  display:flex;align-items:center;gap:10px;
}
.diff-btn:hover{transform:translateY(-1px);}
.diff-easy{border-color:rgba(0,255,136,0.4);color:#00ff88;}
.diff-easy:hover{background:rgba(0,255,136,0.1);}
.diff-medium{border-color:rgba(255,200,0,0.4);color:var(--gold);}
.diff-medium:hover{background:rgba(255,200,0,0.1);}
.diff-hard{border-color:rgba(255,50,85,0.4);color:var(--x);}
.diff-hard:hover{background:rgba(255,50,85,0.1);}
.diff-icon{font-size:1.2rem;min-width:28px;}
.diff-desc{font-size:0.62rem;opacity:0.5;margin-top:1px;}

/* Tournament results overlay */
#tournamentResults{
  position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);
  display:none;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:max(16px,env(safe-area-inset-top,16px)) 16px;overflow-y:auto;
}
.tr-header{text-align:center;margin-bottom:16px;}
.tr-list{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px;}
.tr-row{
  display:flex;align-items:center;gap:10px;
  border-radius:14px;padding:10px 14px;border:1px solid;
  transition:all 0.2s;
}
.tr-winner{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.3);}
.tr-loser{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07);opacity:0.65;}
.tr-draw{background:rgba(0,212,255,0.06);border-color:rgba(0,212,255,0.2);}
.tr-rank{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;min-width:28px;text-align:center;}
.tr-av{font-size:1.1rem;}
.tr-name{flex:1;font-size:0.85rem;font-weight:700;}
.tr-status{font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:50px;}

/* Winner screen */
#scnWinner{text-align:center;}
.trophy-glow{font-size:5rem;filter:drop-shadow(0 0 30px var(--gold));animation:trophy-bounce 1s ease infinite alternate;}
@keyframes trophy-bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}

/* Particles */
.particle{position:fixed;pointer-events:none;border-radius:50%;animation:float-p linear infinite;}
@keyframes float-p{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:0.6}90%{opacity:0.2}100%{transform:translateY(-10vh);opacity:0}}
</style>
</head>
<body>
<canvas id="bgCv"></canvas>
<div id="aiThinking">🤖 الذكاء الاصطناعي يفكر...</div>

<!-- ══ LOGIN ══ -->
<div id="scnLogin" class="screen active">
<div class="card">
  <div class="xo-logo">
    <div style="font-size:0.65rem;opacity:0.3;letter-spacing:4px;margin-bottom:4px;">عبادي</div>
    <div class="xo-logo-main"><span class="xo-x">X</span><span class="xo-o">O</span></div>
    <div style="font-size:0.68rem;opacity:0.35;letter-spacing:3px;margin-top:3px;">إكس أو الملحمي</div>
  </div>

  <div id="errMsg" style="display:none;color:#ff6677;font-size:0.8rem;text-align:center;padding:8px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,0.1);"></div>

  <input class="inp" id="uName" placeholder="🎮 اسمك في الميدان" maxlength="16" autocomplete="off">
  <div style="display:flex;gap:8px;">
    <button class="btn btn-o" style="flex:2;" onclick="createRoom()">
      <span>👑</span> إنشاء غرفة
    </button>
    <button class="btn btn-ghost" style="flex:1;font-size:0.8rem;" onclick="playVsAI()">
      🤖 ضد AI
    </button>
  </div>
  <div class="divider">أو انضم</div>
  <input class="inp" id="rCode" placeholder="🔑 كود الغرفة" maxlength="6" style="letter-spacing:4px;text-transform:uppercase;" autocomplete="off">
  <button class="btn btn-ghost" onclick="joinRoom()">
    <span>🚪</span> انضمام سريع
  </button>
  <button class="btn btn-ghost" style="margin-top:4px;opacity:0.5;font-size:0.82rem;" onclick="goBack()">
    ← عبادي GAMES
  </button>
</div>
</div>

<!-- ══ LOBBY ══ -->
<div id="scnLobby" class="screen">
  <div class="lobby-hdr" style="width:100%;max-width:440px;">
    <div>
      <div style="font-size:0.58rem;opacity:0.35;letter-spacing:2px;">كود الغرفة</div>
      <div class="room-code" id="dispCode">----</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
      <div id="readyPill" class="status-pill sp-green"><span id="rdyC">0</span>/<span id="totC">0</span> جاهز</div>
    </div>
  </div>

  <div style="font-size:0.58rem;letter-spacing:3px;opacity:0.3;margin-bottom:6px;text-align:center;width:100%;max-width:440px;">اللاعبون</div>
  <div class="players-grid" id="playersList" style="max-width:440px;"></div>

  <div class="chat-wrap">
    <div id="chatMsgs"></div>
    <div class="chat-bar">
      <input class="c-inp" id="chatInp" placeholder="قل شيئاً..." maxlength="60" autocomplete="off">
      <button class="c-send" onclick="sendChat()">➤</button>
    </div>
  </div>

  <div class="lobby-actions">
    <button class="btn btn-o" style="flex:2;" onclick="toggleReady()" id="rdyBtn">✓ جاهز</button>
    <button class="btn btn-ghost" style="flex:1;" onclick="leaveRoom()">🚪</button>
  </div>
  <button id="startBtn" class="btn btn-x" style="display:none;max-width:440px;" onclick="requestStart()">
    ⚔️ ابدأ البطولة!
  </button>
  <div id="waitMsg" style="font-size:0.72rem;opacity:0.4;text-align:center;margin-top:4px;display:none;">انتظر موافقة الجميع...</div>
</div>

<!-- ══ BATTLE ══ -->
<div id="scnBattle" class="screen">
  <!-- Match info -->
  <div class="match-hdr" style="max-width:min(360px,90vw);">
    <div class="player-side" id="p1Side">
      <div class="player-symbol" style="color:var(--x);" id="p1Symbol">X</div>
      <div class="player-name-hdr" id="p1Name">—</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div class="vs-badge">VS</div>
      <div class="turn-indicator turn-x" id="turnInd">دور X</div>
    </div>
    <div class="player-side" id="p2Side">
      <div class="player-symbol" style="color:var(--o);" id="p2Symbol">O</div>
      <div class="player-name-hdr" id="p2Name">—</div>
    </div>
  </div>

  <!-- Score -->
  <div class="score-bar" style="max-width:min(360px,90vw);">
    <div class="score-item">
      <div class="score-num" id="scoreX" style="color:var(--x);">0</div>
      <div class="score-label">X</div>
    </div>
    <div class="score-item">
      <div class="round-info" id="roundInfo">جولة 1</div>
      <div class="score-label">ROUND</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="scoreO" style="color:var(--o);">0</div>
      <div class="score-label">O</div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="board" id="board">
      <div class="cell" data-i="0" onclick="clickCell(0)"></div>
      <div class="cell" data-i="1" onclick="clickCell(1)"></div>
      <div class="cell" data-i="2" onclick="clickCell(2)"></div>
      <div class="cell" data-i="3" onclick="clickCell(3)"></div>

/* ════ FIREBASE ════ */
const firebaseConfig={

/* ════ STATE ════ */
let myId=localStorage.getItem('xo_id')||(()=>{const id=Math.random().toString(36).substr(2,8)+'_'+Date.now().toString(36);localStorage.setItem('xo_id',id);return id;})();
let myName='', roomCode='', isLeader=false, isReady=false;
let vsAI=false;
const AVATARS=['🥷','🧙','⚔️','🛡️','🏹','💣','🔱','⚡','🦅','🐺','🦊','🐉'];
let myAvatar=localStorage.getItem('xo_avatar')||(()=>{const a=AVATARS[Math.floor(Math.random()*AVATARS.length)];localStorage.setItem('xo_avatar',a);return a;})();

/* Match state */

/* ════ BG CANVAS ════ */
(function(){
  const cv=document.getElementById('bgCv');
  const ctx=cv.getContext('2d');
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;draw();}
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.strokeStyle='rgba(0,212,255,0.025)';ctx.lineWidth=1;
    for(let x=0;x<cv.width;x+=44){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
    for(let y=0;y<cv.height;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
    const g=ctx.createRadialGradient(cv.width/2,cv.height/2,0,cv.width/2,cv.height/2,cv.width*0.55);
    g.addColorStop(0,'rgba(0,80,180,0.06)');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);
  }
  resize();window.addEventListener('resize',resize);
})();

function spawnParticle(c='rgba(0,212,255,0.5)'){

  document.body.appendChild(d);setTimeout(()=>d.remove(),14000);
}
for(let i=0;i<12;i++) spawnParticle(Math.random()>0.5?'rgba(0,212,255,0.35)':'rgba(255,50,85,0.3)');

/* ════ SCREENS ════ */
function showScreen(id){

  document.getElementById(id).classList.add('active');
}
function showError(msg){const e=document.getElementById('errMsg');e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
function goBack(){

/* ════ LOGIN ════ */
document.getElementById('uName').addEventListener('keydown',e=>{if(e.key==='Enter')createRoom();});
document.getElementById('rCode').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});

function getName(){
  const n=document.getElementById('uName').value.trim();
  if(!n){showError('⚠️ أدخل اسمك!');return null;}
  myName=n;localStorage.setItem('xo_name',n);return n;
}
// Auto-fill saved name
const savedName=localStorage.getItem('xo_name');
if(savedName) document.getElementById('uName').value=savedName;

function createRoom(){

}

function joinRoom(){

    roomCode=code;isLeader=false;
    enterLobby();

}

let aiDifficulty='medium'; // 'easy' | 'medium' | 'hard'

function playVsAI(){

}

}

function startAI(diff){
  aiDifficulty=diff;
  closeDiffModal();
  vsAI=true;roomCode='ai_'+myId;
  p1Id=myId;p1Name=myName;
  p2Id='AI';p2Name='🤖 '+{easy:'سهل',medium:'متوسط',hard:'صعب'}[diff];

}

/* ════ LOBBY ════ */
function enterLobby(){
  showScreen('scnLobby');
  document.getElementById('dispCode').textContent=roomCode;
  db.ref(`xo/${roomCode}/players/${myId}`).set({name:myName,avatar:myAvatar,ready:false,score:0});
  db.ref(`xo/${roomCode}/players/${myId}`).onDisconnect().remove();
  if(isLeader) db.ref(`xo/${roomCode}/leader`).set(myId);
  listenLobby();
}

function listenLobby(){
  db.ref(`xo/${roomCode}`).on('value',snap=>{
    const data=snap.val();if(!data)return;
    const players=data.players||{};
    const leaderId=data.leader;
    const pids=Object.keys(players);
    const readyCount=pids.filter(id=>players[id].ready).length;
    document.getElementById('rdyC').textContent=readyCount;
    document.getElementById('totC').textContent=pids.length;
    // Render players
    const list=document.getElementById('playersList');
    list.innerHTML='';
    pids.forEach(id=>{
      const p=players[id];const isL=(id===leaderId);
      list.innerHTML+=`<div class="p-card ${p.ready?'ready':''}">
        ${isL?'<div class="crown">👑</div>':''}
        <div class="p-avatar">${p.avatar||'🥷'}</div>
        <div class="p-name">${p.name}</div>
      </div>`;
    });
    // Start button (leader only, 2+ players)
    const sb=document.getElementById('startBtn');
    const wm=document.getElementById('waitMsg');
    if(myId===leaderId){
      if(pids.length>=2){
        const nonLeaderNotReady=pids.filter(id=>id!==leaderId&&!players[id].ready).length;
        sb.style.display='flex';
        if(nonLeaderNotReady>0){
          sb.disabled=true;sb.style.opacity='0.4';
          sb.textContent=`⏳ ${nonLeaderNotReady} لم يجهزوا بعد`;
        } else {
          sb.disabled=false;sb.style.opacity='1';
          sb.textContent=`⚔️ ابدأ البطولة (${pids.length} لاعبين)`;
        }
      } else {
        sb.style.display='flex';sb.disabled=true;sb.style.opacity='0.4';
        sb.textContent='انتظر لاعباً آخر...';
      }
      wm.style.display='none';
    } else {
      sb.style.display='none';
      wm.style.display='block';
    }
    // Auto-start
    if(data.started) startTournament(data);
    // Kicked
    if(!players[myId]) showScreen('scnLogin');
  });
  db.ref(`xo/${roomCode}/chat`).limitToLast(15).on('child_added',snap=>{
    const m=snap.val();
    const box=document.getElementById('chatMsgs');
    const d=document.createElement('div');
    d.style.cssText='display:flex;gap:5px;';
    d.innerHTML=`<span style="color:var(--o);font-weight:700;font-size:0.7rem;">${m.u}:</span><span style="font-size:0.7rem;opacity:0.8;">${m.t}</span>`;
    box.appendChild(d);box.scrollTop=box.scrollHeight;
  });
}

function toggleReady(){
  isReady=!isReady;
  db.ref(`xo/${roomCode}/players/${myId}/ready`).set(isReady);
  document.getElementById('rdyBtn').textContent=isReady?'✓ جاهز!':'✓ جاهز';
  document.getElementById('rdyBtn').style.opacity=isReady?'0.7':'1';
}

function requestStart(){
  db.ref(`xo/${roomCode}/players`).once('value',snap=>{
    const pids=Object.keys(snap.val()||{});
    if(pids.length<2)return;
    // Build tournament bracket
    const shuffled=[...pids].sort(()=>Math.random()-0.5);
    db.ref(`xo/${roomCode}/tournamentPlayers`).set(shuffled);
    db.ref(`xo/${roomCode}/started`).set(true);
  });
}

function leaveRoom(){
  db.ref(`xo/${roomCode}/players/${myId}`).remove();
  db.ref(`xo/${roomCode}`).off();
  roomCode='';isReady=false;
  showScreen('scnLogin');
}

function sendChat(){
  const i=document.getElementById('chatInp');
  if(i.value.trim()&&roomCode) db.ref(`xo/${roomCode}/chat`).push({u:myName,t:i.value.trim()});
  i.value='';
}
document.getElementById('chatInp').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});

/* ════ TOURNAMENT ENGINE ════ */
function startTournament(data){
  db.ref(`xo/${roomCode}`).off();
  const players=data.players||{};
  const order=data.tournamentPlayers||Object.keys(players);

  // Build tournament object
  tournament.players=order.map(id=>({id,name:players[id]?.name||'?',avatar:players[id]?.avatar||'🥷',score:0,eliminated:false}));
  tournament.eliminated=[];
  tournament.currentMatchIdx=0;

  if(tournament.players.length===1){
    showWinner(tournament.players[0]);return;
  }

  // Listen for match results from Firebase
  listenTournament();
  showScreen('scnTournament');
  renderBracket();
  scheduleNextMatch();
}

function listenTournament(){
  db.ref(`xo/${roomCode}/currentMatch`).on('value',snap=>{
    const m=snap.val();if(!m)return;
    const active=tournament.players.filter(p=>!p.eliminated);
    if(active.length<=1){
      db.ref(`xo/${roomCode}/currentMatch`).off();
      showWinner(active[0]||tournament.players[0]);
      return;
    }
    p1Id=m.p1;p2Id=m.p2;
    p1Name=tournament.players.find(p=>p.id===m.p1)?.name||'?';
    p2Name=tournament.players.find(p=>p.id===m.p2)?.name||'?';
    const amInMatch=(myId===m.p1||myId===m.p2);
    if(amInMatch){
      mySymbol=(myId===m.p1)?'X':'O';
      scores={X:0,O:0};roundNum=1;
      boardState=Array(9).fill(null);
      showScreen('scnBattle');
      setupBoardUI(p1Name,p2Name);
      listenMatchBoard();
    } else {
      // I'm a spectator — wait in tournament view
      showScreen('scnTournament');
      document.getElementById('waitNextMsg').textContent=`⚔️ ${p1Name} ضد ${p2Name} — انتظر نتيجتك`;
      listenMatchResult();
    }
  });
}

function scheduleNextMatch(){
  const active=tournament.players.filter(p=>!p.eliminated);
  if(active.length<=1){showWinner(active[0]);return;}
  if(myId!==tournament.players.find(p=>!p.eliminated)?.id){
    // Only leader sets the match
    db.ref(`xo/${roomCode}/leader`).once('value',s=>{
      if(s.val()!==myId)return;
      const pair=[...active].sort(()=>Math.random()-0.5).slice(0,2);
      db.ref(`xo/${roomCode}/currentMatch`).set({p1:pair[0].id,p2:pair[1].id,board:Array(9).fill(null),turn:'X',round:1,scoreX:0,scoreO:0});
    });
  }
}

/* ════ BOARD ENGINE ════ */
const WIN_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function setupBoardUI(nameX,nameO){
  document.getElementById('p1Name').textContent=nameX;
  document.getElementById('p2Name').textContent=nameO;
  document.getElementById('scoreX').textContent=scores.X;
  document.getElementById('scoreO').textContent=scores.O;
  document.getElementById('roundInfo').textContent='جولة '+roundNum;
  renderBoard();
  updateTurnUI();
}

function renderBoard(){
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    cell.textContent=boardState[i]||'';
    cell.className='cell';
    if(boardState[i]){cell.classList.add('taken',boardState[i].toLowerCase());}
  });
}

function updateTurnUI(){
  const ind=document.getElementById('turnInd');
  ind.textContent='دور '+currentTurn;
  ind.className='turn-indicator '+(currentTurn==='X'?'turn-x':'turn-o');
}

function clickCell(i){
  if(!gameActive)return;
  if(boardState[i])return;
  if(vsAI){
    if(mySymbol!==currentTurn)return; // not my turn
    makeMove(i);
  } else {
    // multiplayer: check if it's my turn
    const isMyTurn=(currentTurn==='X'&&myId===p1Id)||(currentTurn==='O'&&myId===p2Id);
    if(!isMyTurn)return;
    // Write to Firebase
    db.ref(`xo/${roomCode}/currentMatch/board/${i}`).set(currentTurn);
  }
}

function makeMove(i){
  if(!gameActive||boardState[i])return;
  boardState[i]=currentTurn;
  renderBoard();
  const winner=checkWinner();
  if(winner){
    endRound(winner);
  } else if(boardState.every(c=>c)){
    endRound('draw');
  } else {
    currentTurn=currentTurn==='X'?'O':'X';
    updateTurnUI();
    if(vsAI&&currentTurn!==mySymbol) setTimeout(aiMove,600);
  }
}

function checkWinner(){
  for(const [a,b,c] of WIN_LINES){
    if(boardState[a]&&boardState[a]===boardState[b]&&boardState[a]===boardState[c]){
      // Highlight winning cells
      [a,b,c].forEach(idx=>document.querySelectorAll('.cell')[idx].classList.add('win-cell'));
      return boardState[a];
    }
  }
  return null;
}

function endRound(winner){
  gameActive=false;
  const MAX_ROUNDS=3;
  if(winner==='draw'){
    showResult('🤝','تعادل في هذه الجولة!','لا أحد يسجل نقطة');
    document.getElementById('resContinueBtn').textContent='الجولة التالية ←';
    document.getElementById('resContinueBtn').onclick=()=>{
      document.getElementById('resultOverlay').style.display='none';
      roundNum++;
      // إذا انتهت الجولات بتعادل كامل → Sudden Death
      if(roundNum>MAX_ROUNDS&&scores.X===scores.O){
        suddenDeath=true;
        showResult('⚡','جولة الموت المفاجئ!','أول من يفوز يفوز بالمباراة!');
        document.getElementById('resContinueBtn').textContent='العب الآن! ⚡';
        document.getElementById('resContinueBtn').onclick=()=>{
          document.getElementById('resultOverlay').style.display='none';
          nextRound();
        };
      } else {
        nextRound();
      }
    };
    return;
  }
  scores[winner]++;
  document.getElementById('score'+winner).textContent=scores[winner];
  const winnerName=winner==='X'?p1Name:p2Name;
  const isSuddenWin=suddenDeath;
  suddenDeath=false;
  showResult(winner==='X'?'❌':'⭕',`فاز ${winnerName}!`,isSuddenWin?'🎉 فوز مفاجئ!':'الجولة '+roundNum);
  // Match over: first to 2, or sudden death win
  const matchOver=scores.X>=2||scores.O>=2||(roundNum>=MAX_ROUNDS&&scores.X!==scores.O);
  if(matchOver){
    const matchWinner=scores.X>scores.O?'X':'O';
    document.getElementById('resContinueBtn').textContent='النتيجة النهائية ←';
    document.getElementById('resContinueBtn').onclick=()=>endMatch(matchWinner);
  } else {
    roundNum++;
    document.getElementById('resContinueBtn').textContent='جولة تالية ←';
    document.getElementById('resContinueBtn').onclick=()=>nextRound();
  }
}

function nextRound(){
  document.getElementById('resultOverlay').style.display='none';
  gameActive=true;
  boardState=Array(9).fill(null);
  currentTurn='X';
  document.getElementById('roundInfo').textContent='جولة '+roundNum;
  renderBoard();
  updateTurnUI();
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('win-cell'));
  if(vsAI&&currentTurn!==mySymbol) setTimeout(aiMove,600);
}

function endMatch(matchWinner){
  document.getElementById('resultOverlay').style.display='none';
  if(vsAI){
    const won=matchWinner===mySymbol;
    showScreen('scnWinner');
    document.getElementById('winnerTrophy').textContent=won?'🏆':'🤖';
    document.getElementById('winnerName').textContent=won?myName:'الذكاء الاصطناعي';
    document.getElementById('winnerStats').textContent=`${scores.X} - ${scores.O}`;
    for(let i=0;i<15;i++) spawnParticle(won?'rgba(255,215,0,0.6)':'rgba(255,50,85,0.4)');
  } else {
    // Write result to Firebase
    // تعادل في المباراة → جولة Sudden Death إضافية
    if(matchWinner==='draw'){
      showResult('⚡','تعادل! جولة فاصلة!','من يفوز يتقدم ومن يخسر يُحذف');
      document.getElementById('resContinueBtn').textContent='جولة فاصلة ⚡';
      document.getElementById('resContinueBtn').onclick=()=>{
        document.getElementById('resultOverlay').style.display='none';
        scores={X:0,O:0};roundNum=1;suddenDeath=true;
        boardState=Array(9).fill(null);currentTurn='X';
        gameActive=true;renderBoard();updateTurnUI();
        listenMatchBoard();
      };
      return;
    }
    const winnerId=matchWinner==='X'?p1Id:p2Id;
    const loserId=matchWinner==='X'?p2Id:p1Id;
    // Eliminate loser
    const loserP=tournament.players.find(p=>p.id===loserId);
    if(loserP) loserP.eliminated=true;
    // Show who advances
    const winnerP=tournament.players.find(p=>p.id===winnerId);
    showResult('🎉',`${winnerP?.name||'?'} يتقدم!`,`${loserP?.name||'?'} خرج من البطولة`);
    setTimeout(()=>{
      document.getElementById('resultOverlay').style.display='none';
      db.ref(`xo/${roomCode}/currentMatch/result`).set({winner:winnerId,loser:loserId,draw:false});
    },2200);
  }
}

/* ════ MULTIPLAYER BOARD SYNC ════ */
function listenMatchBoard(){
  gameActive=true;
  boardState=Array(9).fill(null);
  currentTurn='X';
  renderBoard();updateTurnUI();

  db.ref(`xo/${roomCode}/currentMatch`).on('value',snap=>{
    const m=snap.val();if(!m)return;
    // Sync board
    const newBoard=m.board||Array(9).fill(null);
    const changed=newBoard.some((v,i)=>v!==boardState[i]);
    if(changed){
      boardState=newBoard;
      currentTurn=m.turn||'X';
      renderBoard();updateTurnUI();
      // Check win locally
      const w=checkWinner();
      if(w){
        gameActive=false;
        db.ref(`xo/${roomCode}/currentMatch`).off();
        const wName=w==='X'?p1Name:p2Name;
        scores[w]++;
        document.getElementById('score'+w).textContent=scores[w];
        const matchOver=scores.X>=2||scores.O>=2||roundNum>=3;
        if(matchOver){
          const mw=scores.X>scores.O?'X':scores.O>scores.X?'O':'draw';
          showResult(w==='X'?'❌':'⭕',`فاز ${wName}!`,'');
          setTimeout(()=>endMatch(mw),1200);
        } else {
          roundNum++;
          showResult(w==='X'?'❌':'⭕',`فاز ${wName}!`,'جولة تالية...');
          document.getElementById('resContinueBtn').textContent='جولة تالية ←';
          document.getElementById('resContinueBtn').onclick=()=>{
            document.getElementById('resultOverlay').style.display='none';
            // Leader resets board
            db.ref(`xo/${roomCode}/leader`).once('value',ls=>{
              if(ls.val()===myId){
                db.ref(`xo/${roomCode}/currentMatch/board`).set(Array(9).fill(null));
                db.ref(`xo/${roomCode}/currentMatch/turn`).set('X');
                db.ref(`xo/${roomCode}/currentMatch/round`).set(roundNum);
              }
            });
            boardState=Array(9).fill(null);currentTurn='X';gameActive=true;
            renderBoard();updateTurnUI();
            db.ref(`xo/${roomCode}/currentMatch`).on('value',_boardSync);
          };
        }
      } else if(boardState.every(c=>c!==null)){
        gameActive=false;
        db.ref(`xo/${roomCode}/currentMatch`).off();
        showResult('🤝','تعادل!','');
        roundNum++;
        document.getElementById('resContinueBtn').textContent='جولة تالية ←';
        document.getElementById('resContinueBtn').onclick=()=>{
          document.getElementById('resultOverlay').style.display='none';
          db.ref(`xo/${roomCode}/leader`).once('value',ls=>{
            if(ls.val()===myId){
              db.ref(`xo/${roomCode}/currentMatch/board`).set(Array(9).fill(null));
              db.ref(`xo/${roomCode}/currentMatch/turn`).set('X');
            }
          });
          boardState=Array(9).fill(null);currentTurn='X';gameActive=true;
          renderBoard();updateTurnUI();
          listenMatchBoard();
        };
      }
    }
  });

  // Override clickCell for multiplayer
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    cell.onclick=()=>{
      if(!gameActive)return;
      if(boardState[i])return;
      const isMyTurn=(currentTurn==='X'&&myId===p1Id)||(currentTurn==='O'&&myId===p2Id);
      if(!isMyTurn)return;
      const nextTurn=currentTurn==='X'?'O':'X';
      const newBoard=[...boardState];newBoard[i]=currentTurn;
      db.ref(`xo/${roomCode}/currentMatch/board`).set(newBoard);
      db.ref(`xo/${roomCode}/currentMatch/turn`).set(nextTurn);
    };
  });
}

function _boardSync(){}// placeholder

function listenMatchResult(){
  db.ref(`xo/${roomCode}/currentMatch/result`).on('value',snap=>{
    if(!snap.val())return;
    db.ref(`xo/${roomCode}/currentMatch/result`).off();
    const res=snap.val();
    if(res.loser===myId){
      // I lost — mark eliminated
      tournament.players.find(p=>p.id===myId).eliminated=true;
    }
    renderBracket();
    scheduleNextMatch();
  });
}

/* ════ AI ENGINE (Minimax) ════ */
function startMatch_AI(){
  gameActive=true;scores={X:0,O:0};roundNum=1;
  boardState=Array(9).fill(null);currentTurn='X';
  setupBoardUI(myName,'🤖 AI');
  if(mySymbol!=='X') setTimeout(aiMove,700);
}

function aiMove(){
  if(!gameActive)return;
  document.getElementById('aiThinking').style.display='flex';
  setTimeout(()=>{
    const best=getBestMove();
    document.getElementById('aiThinking').style.display='none';
    if(best!==-1) makeMove(best);
  },400+Math.random()*400);
}

function getBestMove(){
  const empty=boardState.map((v,i)=>v?null:i).filter(i=>i!==null);
  if(!empty.length)return -1;

  if(aiDifficulty==='easy'){
    // 60% chance random, 40% best
    if(Math.random()<0.6) return empty[Math.floor(Math.random()*empty.length)];
  }
  if(aiDifficulty==='medium'){
    // Check if can win immediately
    for(const i of empty){
      boardState[i]='O';
      if(checkWinnerArr(boardState)==='O'){boardState[i]=null;return i;}
      boardState[i]=null;
    }
    // Block player win
    for(const i of empty){
      boardState[i]='X';
      if(checkWinnerArr(boardState)==='X'){boardState[i]=null;return i;}
      boardState[i]=null;
    }
    // 50% random otherwise
    if(Math.random()<0.5) return empty[Math.floor(Math.random()*empty.length)];
  }
  // Hard: full minimax
  let bestScore=-Infinity, bestMove=-1;
  for(const i of empty){
    boardState[i]='O';
    const s=minimax(boardState,0,false);
    boardState[i]=null;
    if(s>bestScore){bestScore=s;bestMove=i;}
  }
  return bestMove;
}

function minimax(board,depth,isMax){
  const w=checkWinnerArr(board);
  if(w==='O') return 10-depth;
  if(w==='X') return depth-10;
  if(board.every(c=>c)) return 0;
  if(isMax){
    let best=-Infinity;
    for(let i=0;i<9;i++){
      if(!board[i]){board[i]='O';best=Math.max(best,minimax(board,depth+1,false));board[i]=null;}
    }
    return best;
  } else {
    let best=Infinity;
    for(let i=0;i<9;i++){
      if(!board[i]){board[i]='X';best=Math.min(best,minimax(board,depth+1,true));board[i]=null;}
    }
    return best;
  }
}

function checkWinnerArr(board){
  for(const [a,b,c] of WIN_LINES){
    if(board[a]&&board[a]===board[b]&&board[a]===board[c]) return board[a];
  }
  return null;
}

}

/* ════ WINNER ════ */
function showWinner(player){
  // Show tournament results first
  showTournamentResults(player);
}

function showTournamentResults(champion){
  const overlay=document.getElementById('tournamentResults');
  const list=document.getElementById('trList');
  overlay.style.display='flex';

  // Build ranked list: champion first, then by elimination order (last elim = 2nd)
  const ranked=[...tournament.players];
  // Sort: non-eliminated first (champion), then eliminated in reverse order
  const active=ranked.filter(p=>!p.eliminated);
  const elim=ranked.filter(p=>p.eliminated).reverse(); // last eliminated = best placement
  const final=[...active,...elim];

  list.innerHTML=final.map((p,i)=>{
    const isChamp=p.id===champion?.id||(!p.eliminated&&active.length===1);
    const isDraw=false;
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
    const rowClass=isChamp?'tr-winner':p.eliminated?'tr-loser':'tr-draw';
    const statusText=isChamp?'🏆 البطل':p.eliminated?'❌ خسر':'⚡ تعادل';
    const statusColor=isChamp?'color:var(--gold)':p.eliminated?'color:rgba(255,50,85,0.8)':'color:var(--o)';
    return `<div class="tr-row ${rowClass}">
      <div class="tr-rank">${medal}</div>
      <div class="tr-av">${p.avatar||'🥷'}</div>
      <div class="tr-name">${p.name}${p.id===myId?' (أنت)':''}</div>
      <div class="tr-status" style="${statusColor}">${statusText}</div>
    </div>`;
  }).join('');
}

function closeTrResults(){
  document.getElementById('tournamentResults').style.display='none';
  const champ=tournament.players.find(p=>!p.eliminated)||tournament.players[0];
  showScreen('scnWinner');
  document.getElementById('winnerTrophy').textContent='🏆';
  document.getElementById('winnerName').textContent=champ?.name||'بطل';
  document.getElementById('winnerStats').textContent='بطل البطولة! 🎉';
  for(let i=0;i<20;i++) spawnParticle(`rgba(255,${Math.floor(150+Math.random()*100)},0,0.6)`);
}

function playAgain(){
  scores={X:0,O:0};roundNum=1;boardState=Array(9).fill(null);currentTurn='X';
  if(vsAI){
    showScreen('scnBattle');
    setupBoardUI(myName,'🤖 AI');
    gameActive=true;renderBoard();updateTurnUI();
    if(mySymbol!=='X') setTimeout(aiMove,700);
  } else {
    showScreen('scnLobby');
  }
}
