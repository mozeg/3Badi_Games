<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>عبادي XO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<style>
:root{--x:#ff3355;--o:#00d4ff;--bg:#03030a;--gold:#ffd700;--green:#00ff88;--panel:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--fa:'Cairo',sans-serif;--fe:'Rajdhani',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:var(--fa);position:fixed;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,255,0.025) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,255,0.025) 40px);pointer-events:none;}
.scr{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;padding:max(16px,env(safe-area-inset-top,16px)) 16px max(16px,env(safe-area-inset-bottom,16px));overflow-y:auto;}
.scr.on{display:flex;animation:fin 0.35s ease both;}
@keyframes fin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(135deg,rgba(0,212,255,0.06),rgba(0,0,0,0.5));backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,0.15);border-radius:clamp(18px,5vw,26px);padding:clamp(20px,5vw,30px) clamp(16px,5vw,26px);width:100%;max-width:min(400px,96vw);}
.logo{text-align:center;margin-bottom:18px;}
.logo-big{font-family:var(--fe);font-size:clamp(3rem,14vw,5rem);font-weight:700;line-height:1;}
.lx{color:var(--x);text-shadow:0 0 20px var(--x);}
.lo{color:var(--o);text-shadow:0 0 20px var(--o);}
.inp{width:100%;padding:clamp(11px,3vw,14px) 16px;border-radius:13px;border:1px solid var(--border);background:rgba(0,0,0,0.5);color:#fff;margin-bottom:10px;text-align:center;outline:none;font-size:1rem;font-family:var(--fa);transition:border-color 0.2s;}
.inp:focus{border-color:var(--o);}
.btn{width:100%;padding:clamp(11px,3vw,13px);border-radius:13px;border:none;font-weight:900;cursor:pointer;transition:all 0.18s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fa);font-size:clamp(0.88rem,4vw,1rem);position:relative;overflow:hidden;}
.btn-o{background:linear-gradient(135deg,#0088aa,#00d4ff);color:#000;box-shadow:0 4px 18px rgba(0,212,255,0.3);}
.btn-x{background:linear-gradient(135deg,#cc1133,#ff3355);color:#fff;box-shadow:0 4px 18px rgba(255,50,85,0.3);}
.btn-g{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border:1px solid var(--border);}
.btn:active{transform:scale(0.97);}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0;opacity:0.2;font-size:0.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#fff;}
#errBox{display:none;color:#ff6677;font-size:0.8rem;text-align:center;padding:8px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,0.1);}
#scrLobby{padding:10px 14px;justify-content:flex-start;}
.lhdr{width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:10px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);border-radius:13px;}
.rcode{font-family:var(--fe);font-size:1.3rem;font-weight:700;color:var(--o);letter-spacing:4px;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:420px;margin-bottom:10px;}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;position:relative;}
.pcard.ready{border-color:rgba(0,255,136,0.5);}
.pav{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid var(--border);}
.pnm{font-size:0.58rem;font-weight:700;margin-top:5px;text-align:center;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crown{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:0.85rem;}
.chatbox{width:100%;max-width:420px;border-radius:13px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px;background:rgba(0,0,0,0.3);}
#chatLog{height:65px;overflow-y:auto;padding:7px 10px;font-size:0.7rem;display:flex;flex-direction:column;gap:3px;}
.cbar{display:flex;gap:6px;padding:6px;background:rgba(255,255,255,0.02);}
.cinp{flex:1;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:9px;color:#fff;padding:5px 9px;font-size:0.74rem;font-family:var(--fa);outline:none;}
.csnd{background:var(--o);border:none;border-radius:9px;width:32px;color:#000;cursor:pointer;}
#scrBattle{padding:8px 14px;justify-content:flex-start;gap:6px;}
.mhdr{width:100%;max-width:min(360px,92vw);display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.45);border:1px solid var(--border);border-radius:13px;flex-shrink:0;}
.pside{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:65px;}
.psym{font-family:var(--fe);font-size:1.4rem;font-weight:700;}
.pnhdr{font-size:0.56rem;opacity:0.65;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.turn-ind{font-size:0.7rem;font-weight:700;padding:4px 12px;border-radius:50px;border:1px solid;transition:all 0.25s;}
.tx{background:rgba(255,50,85,0.15);border-color:rgba(255,50,85,0.4);color:var(--x);}
.to{background:rgba(0,212,255,0.15);border-color:rgba(0,212,255,0.4);color:var(--o);}
.sbar{width:100%;max-width:min(360px,92vw);display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid var(--border);flex-shrink:0;}
.sitem{display:flex;flex-direction:column;align-items:center;gap:1px;}
.snum{font-family:var(--fe);font-size:1.4rem;font-weight:700;}
.slbl{font-size:0.52rem;opacity:0.35;letter-spacing:2px;}
.rinfo{font-size:0.62rem;opacity:0.45;text-align:center;}
.bwrap{width:100%;max-width:min(340px,90vw);margin:0 auto;flex-shrink:0;}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,9px);padding:clamp(10px,3vw,14px);background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:18px;}
.cell{aspect-ratio:1;border-radius:clamp(10px,3vw,15px);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-family:var(--fe);font-size:clamp(1.8rem,10vw,2.8rem);font-weight:700;cursor:pointer;transition:all 0.15s;user-select:none;}
.cell:hover:not(.taken){background:rgba(255,255,255,0.09);transform:scale(0.95);}
.cell:active:not(.taken){transform:scale(0.87);}
.cell.taken{cursor:default;}
.cell.cx{color:var(--x);background:rgba(255,50,85,0.1);border-color:rgba(255,50,85,0.3);text-shadow:0 0 14px var(--x);animation:cpop 0.22s ease;}
.cell.co{color:var(--o);background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);text-shadow:0 0 14px var(--o);animation:cpop 0.22s ease;}
.cell.win{animation:wf 0.55s ease infinite alternate;}
@keyframes cpop{0%{transform:scale(0.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes wf{0%{filter:brightness(1)}100%{filter:brightness(2.2);box-shadow:0 0 18px currentColor;}}
#resOverlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.remi{font-size:4rem;margin-bottom:10px;}
.rtit{font-size:clamp(1.3rem,7vw,2rem);font-weight:900;margin-bottom:6px;}
.rsub{font-size:0.8rem;opacity:0.5;margin-bottom:18px;}
#diffModal{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.dcard{background:linear-gradient(135deg,rgba(0,212,255,0.07),rgba(0,0,0,0.6));border:1px solid rgba(0,212,255,0.2);border-radius:22px;padding:26px 22px;width:100%;max-width:300px;text-align:center;}
.dbtn{width:100%;padding:12px;border-radius:13px;border:1px solid;margin-bottom:9px;cursor:pointer;font-family:var(--fa);font-weight:700;font-size:0.88rem;background:rgba(0,0,0,0.4);color:#fff;display:flex;align-items:center;gap:10px;transition:all 0.16s;}
.dbtn:hover{transform:translateY(-1px);}
.de{border-color:rgba(0,255,136,0.4);}.dm{border-color:rgba(255,200,0,0.4);}.dh{border-color:rgba(255,50,85,0.4);}
#scrTournament{padding:10px 14px;justify-content:flex-start;overflow-y:auto;}
.trlist{width:100%;max-width:380px;display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.trow{display:flex;align-items:center;gap:10px;border-radius:13px;padding:9px 13px;border:1px solid;}
.trow.act{border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.06);}
.trow.out{border-color:rgba(255,255,255,0.06);opacity:0.5;}
#scrWinner{text-align:center;}
.trophy{font-size:5rem;animation:tb 1s ease infinite alternate;filter:drop-shadow(0 0 25px var(--gold));}
@keyframes tb{from{transform:translateY(0)}to{transform:translateY(-10px)}}
#aiThink{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,212,255,0.3);border-radius:50px;padding:8px 18px;font-size:0.76rem;color:var(--o);display:none;z-index:200;}
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fp linear infinite;}
@keyframes fp{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.6}90%{opacity:0.2}100%{transform:translateY(-10vh);opacity:0}}
::-webkit-scrollbar{width:2px;height:2px;}::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px;}
/* Settings */
#xoSettingsBtn{position:fixed;top:12px;right:12px;z-index:9998;width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(10px);
  color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
#xoSettingsBtn:hover{background:rgba(0,212,255,0.15);border-color:rgba(0,212,255,0.35);}
#xoSettingsPanel{position:fixed;top:58px;right:12px;z-index:9997;
  background:rgba(5,5,20,0.96);border:1px solid rgba(0,212,255,0.2);
  backdrop-filter:blur(20px);border-radius:18px;padding:12px;width:200px;
  display:none;flex-direction:column;gap:8px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);}
.xsp-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;
  border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.04);
  cursor:pointer;transition:all 0.18s;font-family:var(--fa);color:#fff;
  font-size:0.85rem;font-weight:600;width:100%;text-align:right;}
.xsp-btn:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.25);}
.xsp-icon{font-size:1rem;min-width:22px;text-align:center;}
.xsp-badge{font-size:0.58rem;padding:2px 6px;border-radius:50px;background:rgba(0,212,255,0.15);color:var(--o);border:1px solid rgba(0,212,255,0.2);}
</style>
</head>
<body>
<div id="aiThink">🤖 يفكر...</div>
<button id="xoSettingsBtn" onclick="toggleXOSettings()">⚙️</button>
<div id="xoSettingsPanel">
  <div style="font-size:0.58rem;letter-spacing:3px;opacity:0.3;text-align:center;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,0.06);">الإعدادات</div>
  <button class="xsp-btn" onclick="toggleXOMusic();renderXOSettings()">
    <span class="xsp-icon" id="xoMusicIcon">🎵</span>
    <span id="xoMusicLabel">الموسيقى</span>
    <span class="xsp-badge" id="xoMusicBadge">شغّال</span>
  </button>
  <div style="height:1px;background:rgba(255,255,255,0.06);"></div>
  <button class="xsp-btn" onclick="xoConfirmLeave()">
    <span class="xsp-icon">🚪</span>
    <span style="color:#ff6677;">مغادرة</span>
  </button>
</div>
<!-- STEP 1: NAME -->
<div id="scrLogin" class="scr on">
<div class="card">
  <div class="logo">
    <div style="font-size:0.6rem;opacity:0.25;letter-spacing:4px;margin-bottom:3px;">عبادي</div>
    <div class="logo-big"><span class="lx">X</span><span class="lo">O</span></div>
    <div style="font-size:0.65rem;opacity:0.3;letter-spacing:3px;margin-top:2px;">الملحمي</div>
  </div>
  <div id="errBox"></div>

  <!-- Name + status -->
  <div style="position:relative;width:100%;margin-bottom:5px;">
    <input class="inp" id="uName" placeholder="🎮 اسمك في الميدان"
      maxlength="16" autocomplete="off"
      style="margin-bottom:0;padding-left:42px;"
      oninput="checkName(this.value)">
    <div id="nameIcon" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;"></div>
  </div>
  <div id="nameStatus" style="font-size:0.72rem;text-align:center;min-height:16px;margin-bottom:10px;transition:all 0.2s;"></div>

  <button class="btn btn-o" id="confirmBtn" onclick="goToParty()" disabled style="opacity:0.4;cursor:not-allowed;">
    <span>التالي</span> →
  </button>
  <button class="btn btn-g" style="opacity:0.45;font-size:0.8rem;margin-top:0;" onclick="goBack()">← عبادي GAMES</button>
</div>
</div>

<!-- STEP 2: PARTY -->
<div id="scrParty" class="scr">
<div class="card">
  <!-- Back + welcome -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <button onclick="show('scrLogin')" style="background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:9px;width:34px;height:34px;color:#fff;cursor:pointer;font-size:0.9rem;flex-shrink:0;">←</button>
    <div>
      <div style="font-size:0.58rem;opacity:0.35;letter-spacing:2px;">مرحباً</div>
      <div style="font-weight:900;font-size:1rem;" id="partyHiName">—</div>
    </div>
    <div style="margin-right:auto;font-size:1.4rem;" id="partyAvatar"></div>
  </div>

  <div id="partyErrBox" style="display:none;color:#ff6677;font-size:0.78rem;text-align:center;padding:7px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,0.1);"></div>

  <!-- Create room -->
  <button class="btn btn-o" onclick="createRoom()">👑 إنشاء بارتي جديد</button>

  <!-- VS AI -->
  <button class="btn btn-g" onclick="openDiff()">🤖 العب ضد الذكاء الاصطناعي</button>

  <div class="divider">أو انضم لبارتي</div>

  <!-- Join with code check -->
  <div style="position:relative;width:100%;margin-bottom:5px;">
    <input class="inp" id="rCode" placeholder="🔑 كود البارتي"
      maxlength="6" style="letter-spacing:4px;text-transform:uppercase;margin-bottom:0;padding-left:42px;"
      autocomplete="off" oninput="checkCode(this.value)">
    <div id="codeIcon" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;"></div>
  </div>
  <div id="codeStatus" style="font-size:0.72rem;text-align:center;min-height:16px;margin-bottom:8px;transition:all 0.2s;"></div>

  <button class="btn btn-g" id="joinBtn" onclick="joinRoom()" disabled style="opacity:0.4;cursor:not-allowed;">
    🚪 انضمام سريع
  </button>
</div>
</div>
<!-- LOBBY -->
<div id="scrLobby" class="scr">
  <div class="lhdr">
    <div><div style="font-size:0.55rem;opacity:0.3;letter-spacing:2px;">كود الغرفة</div><div class="rcode" id="dispCode">----</div></div>
    <div style="font-size:0.65rem;color:var(--green);"><span id="rdyC">0</span>/<span id="totC">0</span> جاهز</div>
  </div>
  <div style="font-size:0.55rem;letter-spacing:3px;opacity:0.28;margin-bottom:6px;text-align:center;width:100%;max-width:420px;">اللاعبون</div>
  <div class="pgrid" id="pList" style="max-width:420px;"></div>
  <div class="chatbox">
    <div id="chatLog"></div>
    <div class="cbar">
      <input class="cinp" id="chatInp" placeholder="قل شيئاً..." maxlength="50" autocomplete="off">
      <button class="csnd" onclick="sendChat()">➤</button>
    </div>
  </div>
  <div style="display:flex;gap:6px;width:100%;max-width:420px;margin-bottom:6px;">
    <button class="btn btn-o" style="flex:2;" id="rdyBtn" onclick="toggleReady()">✓ جاهز</button>
    <button class="btn btn-g" style="flex:1;" onclick="leaveRoom()">🚪</button>
  </div>
  <button id="startBtn" class="btn btn-x" style="display:none;max-width:420px;" onclick="requestStart()">⚔️ ابدأ البطولة!</button>
  <div id="waitMsg" style="font-size:0.7rem;opacity:0.35;text-align:center;display:none;">انتظر موافقة الجميع...</div>
</div>
<!-- BATTLE -->
<div id="scrBattle" class="scr">
  <div class="mhdr" style="width:100%;max-width:min(360px,92vw);">
    <div class="pside"><div class="psym" style="color:var(--x);" id="sym1">X</div><div class="pnhdr" id="nm1">—</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div style="font-family:var(--fe);font-size:0.8rem;font-weight:700;opacity:0.35;">VS</div>
      <div class="turn-ind tx" id="turnInd">دور X</div>
    </div>
    <div class="pside"><div class="psym" style="color:var(--o);" id="sym2">O</div><div class="pnhdr" id="nm2">—</div></div>
  </div>
  <div class="sbar" style="width:100%;max-width:min(360px,92vw);">
    <div class="sitem"><div class="snum" id="scX" style="color:var(--x);">0</div><div class="slbl">X</div></div>
    <div class="sitem"><div class="rinfo" id="rnInfo">جولة 1</div><div class="slbl">ROUND</div></div>
    <div class="sitem"><div class="snum" id="scO" style="color:var(--o);">0</div><div class="slbl">O</div></div>
  </div>
  <div class="bwrap"><div class="board" id="board"></div></div>
  <div style="font-size:0.68rem;opacity:0.35;margin-top:6px;text-align:center;flex-shrink:0;" id="myTurnMsg"></div>
</div>
<!-- TOURNAMENT -->
<div id="scrTournament" class="scr">
  <div style="text-align:center;margin-bottom:8px;">
    <div style="font-family:var(--fe);font-size:1.5rem;font-weight:700;color:var(--o);">🏆 البطولة</div>
    <div id="tournMsg" style="font-size:0.72rem;opacity:0.45;margin-top:3px;"></div>
  </div>
  <div class="trlist" id="trList"></div>
</div>
<!-- WINNER -->
<div id="scrWinner" class="scr">
<div class="card" style="text-align:center;">
  <div class="trophy" id="winTrophy">🏆</div>
  <div style="font-size:0.7rem;opacity:0.35;letter-spacing:3px;margin:8px 0 3px;">البطل</div>
  <div id="winName" style="font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 18px var(--gold);">—</div>
  <div id="winStats" style="font-size:0.72rem;opacity:0.4;margin-top:3px;margin-bottom:18px;"></div>
  <button class="btn btn-o" onclick="playAgain()">⚔️ جولة جديدة</button>
  <button class="btn btn-g" style="margin-top:0;" onclick="goBack()">← عبادي GAMES</button>
</div>
</div>
<!-- RESULT OVERLAY -->
<div id="resOverlay">
  <div class="remi" id="rEmi">🎉</div>
  <div class="rtit" id="rTit">—</div>
  <div class="rsub" id="rSub"></div>
  <button class="btn btn-o" style="max-width:180px;" id="rBtn" onclick="onResBtn()">التالي ←</button>
</div>
<!-- DIFFICULTY -->
<div id="diffModal">
<div class="dcard">
  <div style="font-size:1rem;font-weight:900;margin-bottom:4px;">🤖 الصعوبة</div>
  <div style="font-size:0.68rem;opacity:0.35;margin-bottom:16px;">اختر مستوى الذكاء الاصطناعي</div>
  <button class="dbtn de" onclick="startAI('easy')">🟢 <div style="text-align:right;"><div>سهل</div><div style="font-size:0.58rem;opacity:0.45;">يخطئ أحياناً</div></div></button>
  <button class="dbtn dm" onclick="startAI('medium')">🟡 <div style="text-align:right;"><div>متوسط</div><div style="font-size:0.58rem;opacity:0.45;">ذكاء معقول</div></div></button>
  <button class="dbtn dh" onclick="startAI('hard')">🔴 <div style="text-align:right;"><div>صعب — Minimax</div><div style="font-size:0.58rem;opacity:0.45;">لا يُهزم تقريباً</div></div></button>
  <button class="btn btn-g" style="margin-top:4px;" onclick="closeDiff()">إلغاء</button>
</div>
</div>
<script>
const FB={apiKey:"AIzaSyBJV_Nu4eUDFhOcSR271SUj9IunkS6Mh08",authDomain:"game-2-ac5cc.firebaseapp.com",projectId:"game-2-ac5cc",databaseURL:"https://game-2-ac5cc-default-rtdb.firebaseio.com"};
if(!firebase.apps.length)firebase.initializeApp(FB);
const db=firebase.database();
let nameOk=false,nameTimer=null,codeOk=false,codeTimer=null;
let myId=localStorage.getItem('xo_id')||(()=>{const id='xo_'+Math.random().toString(36).substr(2,8);localStorage.setItem('xo_id',id);return id;})();
let myName='',roomCode='',isLeader=false,isReady=false,vsAI=false,aiDiff='medium';
const AVTS=['🥷','🧙','⚔️','🛡️','🏹','⚡','🦊','🐉','💣','🔱'];
let myAv=localStorage.getItem('xo_av')||(()=>{const a=AVTS[Math.floor(Math.random()*AVTS.length)];localStorage.setItem('xo_av',a);return a;})();
let board=Array(9).fill(null),curTurn='X',mySymbol='',gameOn=false;
let scores={X:0,O:0},roundN=1;
let p1id='',p2id='',p1nm='',p2nm='';
let tourn={players:[]};
let matchRef=null,lobbyRef=null;
const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const sN=localStorage.getItem('xo_name');
if(sN){
  document.getElementById('uName').value=sN;
  myName=sN;
  // Mark as available immediately
  nameOk=true;
  const st=document.getElementById('nameStatus');const ic=document.getElementById('nameIcon');const btn=document.getElementById('confirmBtn');
  if(st)st.textContent='✅ مرحباً مجدداً '+sN+'!';if(st)st.style.color='#00ff88';if(ic)ic.textContent='✅';
  if(btn){btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';}
}
for(let i=0;i<10;i++){const d=document.createElement('div');d.className='pt';d.style.cssText=`left:${Math.random()*100}vw;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:${Math.random()>0.5?'rgba(0,212,255,0.35)':'rgba(255,50,85,0.3)'};animation-duration:${5+Math.random()*7}s;animation-delay:-${Math.random()*7}s;`;document.body.appendChild(d);}
(function(){const p=new URLSearchParams(location.search);const jc=p.get('join')||localStorage.getItem('xo_join_code');const jn=p.get('name')||localStorage.getItem('xo_join_name');localStorage.removeItem('xo_join_code');localStorage.removeItem('xo_join_name');if(jc){setTimeout(()=>{if(jn){myName=jn;document.getElementById('uName').value=jn;}document.getElementById('rCode').value=jc;const n=document.getElementById('uName').value.trim();if(!n)return;myName=n;localStorage.setItem('xo_name',n);db.ref(`xo/${jc}`).once('value',s=>{if(!s.exists()){showErr('❌ الغرفة غير موجودة!');return;}if(s.val().started){showErr('⚠️ البطولة بدأت!');return;}roomCode=jc;isLeader=false;enterLobby();});},400);}})();
function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function showErr(m){const e=document.getElementById('errBox')||document.getElementById('partyErrBox');if(!e)return;e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
/* ── Name availability ── */
function checkName(val){
  const name=val.trim();
  const st=document.getElementById('nameStatus');
  const ic=document.getElementById('nameIcon');
  const btn=document.getElementById('confirmBtn');
  nameOk=false;btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='not-allowed';
  ic.textContent='';st.textContent='';
  if(name.length<2){if(name.length===1){st.textContent='الاسم قصير جداً';st.style.color='rgba(255,255,255,0.35)';}return;}
  st.textContent='⏳ جاري التحقق...';st.style.color='rgba(255,255,255,0.4)';ic.textContent='⏳';
  clearTimeout(nameTimer);
  nameTimer=setTimeout(()=>{
    // Quick local allow — Firebase check as bonus
    nameOk=true;
    st.textContent='✅ الاسم متاح!';st.style.color='#00ff88';ic.textContent='✅';
    btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';
    // Async Firebase check
    try{
      db.ref('playerNames/'+name.toLowerCase().split(' ').join('_')).once('value')
        .then(snap=>{
          if(snap.exists()&&snap.val()?.id!==myId){
            nameOk=false;st.textContent='❌ الاسم محجوز';st.style.color='#ff5566';ic.textContent='❌';
            btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='not-allowed';
          }
        }).catch(()=>{});
    }catch(e){}
  },400);
}

function goToParty(){
  const name=document.getElementById('uName').value.trim();
  if(!name||!nameOk)return;
  myName=name;localStorage.setItem('xo_name',name);
  // Reserve name
  const key=myName.toLowerCase().split(' ').join('_');
  db.ref('playerNames/'+key).set({id:myId,ts:Date.now()}).catch(()=>{});
  db.ref('playerNames/'+key).onDisconnect().remove();
  // Show party screen
  document.getElementById('partyHiName').textContent=myName;
  document.getElementById('partyAvatar').textContent=myAv;
  document.getElementById('rCode').value='';
  document.getElementById('codeStatus').textContent='';
  document.getElementById('codeIcon').textContent='';
  codeOk=false;
  const jb=document.getElementById('joinBtn');jb.disabled=true;jb.style.opacity='0.4';jb.style.cursor='not-allowed';
  show('scrParty');
}

/* ── Code check ── */
function checkCode(val){
  const code=val.trim().toUpperCase();
  const st=document.getElementById('codeStatus');
  const ic=document.getElementById('codeIcon');
  const btn=document.getElementById('joinBtn');
  codeOk=false;btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='not-allowed';
  ic.textContent='';st.textContent='';
  if(code.length<4){return;}
  st.textContent='⏳ جاري البحث...';st.style.color='rgba(255,255,255,0.4)';ic.textContent='⏳';
  clearTimeout(codeTimer);
  codeTimer=setTimeout(()=>{
    db.ref(`xo/${code}`).once('value',snap=>{
      if(snap.exists()&&!snap.val().started){
        const cnt=Object.keys(snap.val().players||{}).length;
        codeOk=true;st.textContent='✅ البارتي موجود — '+cnt+' لاعب';st.style.color='#00ff88';ic.textContent='✅';
        btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';
      } else if(snap.exists()&&snap.val().started){
        codeOk=false;st.textContent='⚠️ البطولة بدأت بالفعل!';st.style.color='#ffaa00';ic.textContent='⚠️';
      } else {
        codeOk=false;st.textContent='❌ الكود غير موجود';st.style.color='#ff5566';ic.textContent='❌';
      }
    });
  },400);
}

function getN(){const n=document.getElementById('uName')?.value?.trim()||myName;if(!n){showPartyErr('⚠️ أدخل اسمك!');return null;}myName=n;localStorage.setItem('xo_name',n);return n;}
function showPartyErr(m){const e=document.getElementById('partyErrBox');if(!e)return;e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',3000);}
function goBack(){if(lobbyRef){lobbyRef.off();lobbyRef=null;}if(matchRef){matchRef.off();matchRef=null;}if(roomCode){db.ref(`xo/${roomCode}/players/${myId}`).remove();}roomCode='';vsAI=false;window.location.href='index.html';}
document.getElementById('uName').addEventListener('keydown',e=>{if(e.key==='Enter'&&nameOk)goToParty();});
document.getElementById('rCode')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&codeOk)joinRoom();});
document.getElementById('chatInp').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
function createRoom(){if(!myName){showPartyErr('⚠️ أدخل اسمك!');return;}roomCode=Math.floor(1000+Math.random()*9000).toString();isLeader=true;enterLobby();}
function joinRoom(){if(!codeOk)return;if(!myName){showPartyErr('⚠️ أدخل اسمك!');return;}const code=document.getElementById('rCode').value.trim().toUpperCase();if(!code)return;roomCode=code;isLeader=false;enterLobby();}
function openDiff(){if(!myName){showPartyErr('⚠️ أدخل اسمك!');return;}document.getElementById('diffModal').style.display='flex';}
function closeDiff(){document.getElementById('diffModal').style.display='none';}
function startAI(diff){closeDiff();aiDiff=diff;vsAI=true;p1id=myId;p1nm=myName;p2id='AI';p2nm='🤖 '+{easy:'سهل',medium:'متوسط',hard:'صعب'}[diff];mySymbol='X';scores={X:0,O:0};roundN=1;buildBoard();show('scrBattle');setupUI(p1nm,p2nm);startRoundAI();}
function enterLobby(){show('scrLobby');document.getElementById('dispCode').textContent=roomCode;db.ref(`xo/${roomCode}/players/${myId}`).set({name:myName,av:myAv,ready:false});db.ref(`xo/${roomCode}/players/${myId}`).onDisconnect().remove();if(isLeader)db.ref(`xo/${roomCode}/leader`).set(myId);listenLobby();}
function listenLobby(){
  if(lobbyRef)lobbyRef.off();
  lobbyRef=db.ref(`xo/${roomCode}`);
  lobbyRef.on('value',snap=>{
    const data=snap.val();if(!data)return;
    const pl=data.players||{};const lid=data.leader;const pids=Object.keys(pl);
    const rdy=pids.filter(id=>pl[id].ready).length;
    document.getElementById('rdyC').textContent=rdy;document.getElementById('totC').textContent=pids.length;
    document.getElementById('pList').innerHTML=pids.map(id=>{const p=pl[id];const isL=(id===lid);return `<div class="pcard ${p.ready?'ready':''}"><div class="pav">${p.av||'🥷'}</div><div class="pnm">${isL?'👑 ':''} ${p.name}</div></div>`;}).join('');
    const sb=document.getElementById('startBtn');const wm=document.getElementById('waitMsg');
    if(myId===lid){wm.style.display='none';if(pids.length<2){sb.style.display='flex';sb.disabled=true;sb.style.opacity='0.4';sb.textContent='انتظر لاعباً آخر...';}else{const nr=pids.filter(id=>id!==lid&&!pl[id].ready).length;sb.style.display='flex';if(nr>0){sb.disabled=true;sb.style.opacity='0.45';sb.textContent='⏳ '+nr+' لم يجهزوا';}else{sb.disabled=false;sb.style.opacity='1';sb.textContent='⚔️ ابدأ ('+pids.length+' لاعبين)';}}}else{sb.style.display='none';wm.style.display='block';}
    if(data.started&&data.currentMatch){lobbyRef.off();lobbyRef=null;initTourn(data);}
    if(!pl[myId]&&roomCode){show('scrLogin');}
  });
  db.ref(`xo/${roomCode}/chat`).limitToLast(15).on('child_added',snap=>{const m=snap.val();const box=document.getElementById('chatLog');const d=document.createElement('div');d.style.cssText='display:flex;gap:5px;';d.innerHTML=`<span style="color:var(--o);font-weight:700;">${m.u}:</span><span style="opacity:0.8;">${m.t}</span>`;box.appendChild(d);box.scrollTop=box.scrollHeight;});
}
function toggleReady(){isReady=!isReady;db.ref(`xo/${roomCode}/players/${myId}/ready`).set(isReady);const b=document.getElementById('rdyBtn');b.textContent=isReady?'✓ جاهز!':'✓ جاهز';b.style.opacity=isReady?'0.6':'1';}
function requestStart(){db.ref(`xo/${roomCode}/players`).once('value',snap=>{const pl=snap.val()||{};const pids=Object.keys(pl);if(pids.length<2)return;const shuffled=[...pids].sort(()=>Math.random()-0.5);const m0={p1:shuffled[0],p2:shuffled[1],board:Array(9).fill(null),turn:'X',sx:0,so:0,round:1};db.ref(`xo/${roomCode}/tournamentPlayers`).set(shuffled);db.ref(`xo/${roomCode}/eliminated`).set([]);db.ref(`xo/${roomCode}/currentMatch`).set(m0);db.ref(`xo/${roomCode}/started`).set(true);});}
function leaveRoom(){if(lobbyRef){lobbyRef.off();lobbyRef=null;}db.ref(`xo/${roomCode}/players/${myId}`).remove();roomCode='';isReady=false;show('scrLogin');}
function sendChat(){const i=document.getElementById('chatInp');if(i.value.trim()&&roomCode)db.ref(`xo/${roomCode}/chat`).push({u:myName,t:i.value.trim()});i.value='';}
function initTourn(data){const pl=data.players||{};const order=data.tournamentPlayers||Object.keys(pl);tourn.players=order.map(id=>({id,name:pl[id]?.name||'?',av:pl[id]?.av||'🥷',out:false}));startMatch(data.currentMatch);}
function startMatch(m){
  if(matchRef){matchRef.off();matchRef=null;}
  if(!m)return;
  p1id=m.p1;p2id=m.p2;
  p1nm=tourn.players.find(p=>p.id===m.p1)?.name||'?';
  p2nm=tourn.players.find(p=>p.id===m.p2)?.name||'?';
  const iAm=(myId===m.p1||myId===m.p2);
  if(iAm){mySymbol=myId===m.p1?'X':'O';buildBoard();show('scrBattle');setupUI(p1nm,p2nm);syncFromMatch(m);gameOn=true;}
  else{show('scrTournament');renderTourn('⚔️ '+p1nm+' ضد '+p2nm+' — انتظر دورك');}
  matchRef=db.ref(`xo/${roomCode}/currentMatch`);
  matchRef.on('value',snap=>{
    const md=snap.val();if(!md)return;
    if(md.done){matchRef.off();matchRef=null;onMatchDone(md);return;}
    if(!iAm)return;
    const nb=md.board||Array(9).fill(null);
    const changed=nb.some((v,i)=>v!==board[i]);
    if(!changed&&md.turn===curTurn)return;
    board=nb;curTurn=md.turn||'X';
    scores={X:md.sx||0,O:md.so||0};roundN=md.round||1;
    renderBoard();updateTurnUI();
    document.getElementById('rnInfo').textContent='جولة '+roundN;
    document.getElementById('scX').textContent=scores.X;
    document.getElementById('scO').textContent=scores.O;
    const myTurn=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
    document.getElementById('myTurnMsg').textContent=myTurn?'🎯 دورك!':'انتظر دورك...';
    if(gameOn){
      const w=checkWin(board);
      if(w){gameOn=false;matchRef.off();matchRef=null;onRoundEnd(w);}
      else if(board.every(c=>c!==null)){gameOn=false;matchRef.off();matchRef=null;onRoundEnd('draw');}
    }
  });
}
function syncFromMatch(m){board=m.board||Array(9).fill(null);curTurn=m.turn||'X';scores={X:m.sx||0,O:m.so||0};roundN=m.round||1;renderBoard();updateTurnUI();document.getElementById('scX').textContent=scores.X;document.getElementById('scO').textContent=scores.O;document.getElementById('rnInfo').textContent='جولة '+roundN;const myTurn=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);document.getElementById('myTurnMsg').textContent=myTurn?'🎯 دورك!':'انتظر دورك...';}
function buildBoard(){const b=document.getElementById('board');b.innerHTML='';for(let i=0;i<9;i++){const c=document.createElement('div');c.className='cell';c.dataset.i=i;c.addEventListener('click',()=>cellClick(i));b.appendChild(c);}}
function renderBoard(){document.querySelectorAll('.cell').forEach((c,i)=>{c.textContent=board[i]||'';c.className='cell';if(board[i]){c.classList.add('taken','c'+board[i].toLowerCase());}});const wl=getWinLine(board);if(wl)wl.forEach(i=>document.querySelectorAll('.cell')[i].classList.add('win'));}
function cellClick(i){
  if(!gameOn||board[i])return;
  if(vsAI){if(mySymbol!==curTurn)return;const nb=[...board];nb[i]=curTurn;board=nb;curTurn=curTurn==='X'?'O':'X';renderBoard();updateTurnUI();const w=checkWin(board);if(w){gameOn=false;onRoundEnd(w);}else if(board.every(c=>c)){gameOn=false;onRoundEnd('draw');}else setTimeout(aiMove,400+Math.random()*400);}
  else{const myTurn=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);if(!myTurn)return;const nb=[...board];nb[i]=curTurn;const nt=curTurn==='X'?'O':'X';db.ref(`xo/${roomCode}/currentMatch`).update({board:nb,turn:nt});}
}
function updateTurnUI(){const ind=document.getElementById('turnInd');ind.textContent='دور '+curTurn;ind.className='turn-ind '+(curTurn==='X'?'tx':'to');}
function setupUI(n1,n2){document.getElementById('nm1').textContent=n1;document.getElementById('nm2').textContent=n2;board=Array(9).fill(null);curTurn='X';scores={X:0,O:0};roundN=1;renderBoard();updateTurnUI();document.getElementById('scX').textContent=0;document.getElementById('scO').textContent=0;document.getElementById('rnInfo').textContent='جولة 1';}
function checkWin(b){for(const [a,c,d] of WINS)if(b[a]&&b[a]===b[c]&&b[a]===b[d])return b[a];return null;}
function getWinLine(b){for(const l of WINS)if(b[l[0]]&&b[l[0]]===b[l[1]]&&b[l[0]]===b[l[2]])return l;return null;}
function onRoundEnd(w){
  if(w==='draw'){showRes('🤝','تعادل!','جولة تالية');setResBtn('جولة تالية ←',()=>{closeRes();nextRound(false);});}
  else{scores[w]++;const wname=w==='X'?p1nm:p2nm;const done=scores.X>=2||scores.O>=2||roundN>=3;showRes(w==='X'?'❌':'⭕','فاز '+wname+'!',done?'نهاية المباراة':'');if(done){const mw=scores.X>scores.O?'X':scores.O>scores.X?'O':'draw';setResBtn('النتيجة ←',()=>{closeRes();endMatch(mw);});}else{setResBtn('جولة تالية ←',()=>{closeRes();nextRound(false);});}}
}
function nextRound(sd){
  roundN++;board=Array(9).fill(null);curTurn='X';gameOn=true;
  if(vsAI){renderBoard();updateTurnUI();document.getElementById('rnInfo').textContent='جولة '+roundN;if(mySymbol!=='X')setTimeout(aiMove,600);}
  else{db.ref(`xo/${roomCode}/leader`).once('value',ls=>{if(ls.val()===myId){db.ref(`xo/${roomCode}/currentMatch`).update({board:Array(9).fill(null),turn:'X',round:roundN,sx:scores.X,so:scores.O});}});setTimeout(()=>startMatch({p1:p1id,p2:p2id,board:Array(9).fill(null),turn:'X',sx:scores.X,so:scores.O,round:roundN}),300);}
}
function endMatch(mw){
  if(vsAI){const won=mw===mySymbol;showFinal(won?myName:p2nm,scores.X+' - '+scores.O);return;}
  if(mw==='draw'){showRes('⚡','تعادل تام!','جولة فاصلة — أول من يفوز يتقدم');setResBtn('جولة فاصلة ⚡',()=>{closeRes();nextRound(true);});return;}
  const wid=mw==='X'?p1id:p2id;const lid2=mw==='X'?p2id:p1id;
  const loserP=tourn.players.find(p=>p.id===lid2);if(loserP)loserP.out=true;
  const winP=tourn.players.find(p=>p.id===wid);
  showRes('🎉',winP?.name+' يتقدم!',loserP?.name+' خرج من البطولة');
  setResBtn('موافق',()=>{closeRes();db.ref(`xo/${roomCode}/leader`).once('value',ls=>{if(ls.val()===myId){db.ref(`xo/${roomCode}/currentMatch`).update({done:true,winner:wid,loser:lid2});}});});
}
function onMatchDone(md){
  const loserP=tourn.players.find(p=>p.id===md.loser);if(loserP)loserP.out=true;
  const active=tourn.players.filter(p=>!p.out);
  if(active.length<=1){showFinal(active[0]?.name||'بطل','🏆 بطل البطولة!');return;}
  if(myId===md.winner||myId===md.loser){
    show('scrTournament');renderTourn(myId===md.winner?'🎉 أنت تقدمت! انتظر الجولة التالية':'❌ خرجت من البطولة');
  }
  db.ref(`xo/${roomCode}/leader`).once('value',ls=>{
    if(ls.val()===myId){
      const pairs=[...active].sort(()=>Math.random()-0.5);
      const nm={p1:pairs[0].id,p2:pairs[1].id,board:Array(9).fill(null),turn:'X',sx:0,so:0,round:1};
      setTimeout(()=>db.ref(`xo/${roomCode}/currentMatch`).set(nm),1500);
    }
  });
  matchRef=db.ref(`xo/${roomCode}/currentMatch`);
  matchRef.on('value',snap=>{if(!snap.val()||snap.val().done===undefined)return;matchRef.off();matchRef=null;startMatch(snap.val());});
}
function renderTourn(msg){document.getElementById('tournMsg').textContent=msg;const a=tourn.players.filter(p=>!p.out);const o=tourn.players.filter(p=>p.out);document.getElementById('trList').innerHTML=`<div style="font-size:0.58rem;letter-spacing:3px;opacity:0.28;text-align:center;margin-bottom:5px;">⚡ نشطون (${a.length})</div>${a.map(p=>`<div class="trow act"><span>${p.av}</span><span style="font-size:0.82rem;font-weight:700;flex:1;">${p.name}${p.id===myId?' (أنت)':''}</span><span style="font-size:0.62rem;color:var(--green);">✅</span></div>`).join('')}${o.length?`<div style="font-size:0.58rem;letter-spacing:3px;opacity:0.28;text-align:center;margin:7px 0 5px;">💀 خرجوا</div>${o.map(p=>`<div class="trow out"><span style="filter:grayscale(1);">${p.av}</span><span style="font-size:0.82rem;flex:1;">${p.name}</span><span style="font-size:0.62rem;color:rgba(255,50,85,0.7);">❌</span></div>`).join('')}`:'`'}`;} 
function startRoundAI(){board=Array(9).fill(null);curTurn='X';gameOn=true;renderBoard();updateTurnUI();if(mySymbol!=='X')setTimeout(aiMove,600);}
function aiMove(){if(!gameOn)return;document.getElementById('aiThink').style.display='flex';setTimeout(()=>{document.getElementById('aiThink').style.display='none';const i=bestMove();if(i!==-1){const nb=[...board];nb[i]=curTurn;board=nb;curTurn=curTurn==='X'?'O':'X';renderBoard();updateTurnUI();const w=checkWin(board);if(w){gameOn=false;onRoundEnd(w);}else if(board.every(c=>c)){gameOn=false;onRoundEnd('draw');}}},400+Math.random()*400);}
function bestMove(){const emp=board.map((v,i)=>v?null:i).filter(i=>i!==null);if(!emp.length)return -1;const ai=curTurn;const hu=ai==='X'?'O':'X';if(aiDiff==='easy'&&Math.random()<0.6)return emp[Math.floor(Math.random()*emp.length)];if(aiDiff==='medium'){for(const i of emp){board[i]=ai;if(checkWin(board)){board[i]=null;return i;}board[i]=null;}for(const i of emp){board[i]=hu;if(checkWin(board)){board[i]=null;return i;}board[i]=null;}if(Math.random()<0.45)return emp[Math.floor(Math.random()*emp.length)];}let bs=-Infinity,bm=-1;for(const i of emp){board[i]=ai;const s=mm(board,0,false,ai,hu);board[i]=null;if(s>bs){bs=s;bm=i;}}return bm;}
function mm(b,d,max,ai,hu){const w=checkWin(b);if(w===ai)return 10-d;if(w===hu)return d-10;if(b.every(c=>c))return 0;const sym=max?ai:hu;let best=max?-Infinity:Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]=sym;const s=mm(b,d+1,!max,ai,hu);b[i]=null;best=max?Math.max(best,s):Math.min(best,s);}}return best;}

/* ══ AUDIO ENGINE ══ */
let xoAudioCtx=null;
let xoMusicOn=localStorage.getItem('xo_music')!=='off';
let xoMasterGain=null;
let xoBgNodes=[];

function initXOAudio(){
  if(xoAudioCtx)return;
  xoAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  xoMasterGain=xoAudioCtx.createGain();
  xoMasterGain.gain.value=0.15;
  xoMasterGain.connect(xoAudioCtx.destination);
  if(xoMusicOn)startXOMusic();
}
document.addEventListener('touchstart',initXOAudio,{once:true});
document.addEventListener('click',initXOAudio,{once:true});

function playTone(freq,dur,vol=0.2,type='sine',delay=0){
  if(!xoAudioCtx)return;
  const o=xoAudioCtx.createOscillator();
  const g=xoAudioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,xoAudioCtx.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,xoAudioCtx.currentTime+delay+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,xoAudioCtx.currentTime+delay+dur);
  o.connect(g);g.connect(xoAudioCtx.destination);
  o.start(xoAudioCtx.currentTime+delay);
  o.stop(xoAudioCtx.currentTime+delay+dur+0.05);
}

// X click sound — sharp strike
function sfxX(){playTone(220,0.12,0.25,'sawtooth');playTone(330,0.08,0.12,'sine',0.06);}
// O click sound — soft bell
function sfxO(){playTone(528,0.18,0.2,'sine');playTone(792,0.12,0.1,'sine',0.05);}
// Win sound — ascending fanfare
function sfxWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,0.25,0.18,'sine',i*0.12));}
// Draw sound — neutral thud
function sfxDraw(){playTone(330,0.15,0.2,'triangle');playTone(220,0.2,0.15,'triangle',0.1);}
// Lose sound — descending
function sfxLose(){[392,330,262,196].forEach((f,i)=>playTone(f,0.2,0.15,'sawtooth',i*0.1));}
// Button click
function sfxClick(){playTone(660,0.07,0.12,'sine');}
// Ready/confirm
function sfxConfirm(){playTone(440,0.08,0.15,'sine');playTone(880,0.12,0.18,'sine',0.1);}
// Join room
function sfxJoin(){[330,440,550].forEach((f,i)=>playTone(f,0.1,0.15,'sine',i*0.08));}
// Turn change
function sfxTurn(){playTone(440,0.06,0.1,'sine');}

/* BG Music — gentle XO theme */
function startXOMusic(){
  if(!xoAudioCtx||!xoMusicOn)return;
  stopXOMusic();
  const scale=[261,294,330,349,392,440,494,523];
  const mel=[0,2,4,5,4,2,0,2,4,7,5,4,2,4,2,0];
  const bpm=72,beat=60/bpm;
  function sched(start){
    if(!xoMusicOn)return;
    mel.forEach((n,i)=>{
      const t=start+i*beat;
      const o=xoAudioCtx.createOscillator();const g=xoAudioCtx.createGain();
      o.type='sine';o.frequency.value=scale[n]*2;
      g.gain.setValueAtTime(0,xoAudioCtx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.06,xoAudioCtx.currentTime+t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,xoAudioCtx.currentTime+t+beat*0.7);
      o.connect(g);g.connect(xoMasterGain);o.start(xoAudioCtx.currentTime+t);o.stop(xoAudioCtx.currentTime+t+beat);
      xoBgNodes.push(o);
    });
    const len=mel.length*beat;
    const tid=setTimeout(()=>sched(0),Math.max(0,(len-0.1)*1000));
    xoBgNodes.push({stop:()=>clearTimeout(tid)});
  }
  sched(0.1);
}
function stopXOMusic(){xoBgNodes.forEach(n=>{try{n.stop?n.stop():null;}catch(e){}});xoBgNodes=[];}
function toggleXOMusic(){
  xoMusicOn=!xoMusicOn;localStorage.setItem('xo_music',xoMusicOn?'on':'off');
  if(xoMusicOn){if(xoMasterGain)xoMasterGain.gain.value=0.15;initXOAudio();startXOMusic();}
  else stopXOMusic();
}

  else{

};

// Sound on cell click — patch the click listener after buildBoard
const _origBuildBoard=buildBoard;
window.buildBoard=function(){
  _origBuildBoard();
  document.querySelectorAll('.cell').forEach((cell,i)=>{
    const orig=cell.onclick;
    cell.addEventListener('click',()=>{
      if(gameOn&&!board[i]){
        initXOAudio();
        // determine whose turn
        if(vsAI&&curTurn===mySymbol) sfxX();
        else if(!vsAI){
          const myT=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
          if(myT) curTurn==='X'?sfxX():sfxO();
        }
      }
    });
  });
};
