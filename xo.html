<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>عبادي XO</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<style>
:root{--x:#ff3355;--o:#00d4ff;--bg:#03030a;--gold:#ffd700;--green:#00ff88;--panel:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--fa:'Cairo',sans-serif;--fe:'Rajdhani',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:var(--fa);position:fixed;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,255,0.025) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,255,0.025) 40px);pointer-events:none;}
.scr{display:none;position:fixed;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;padding:max(16px,env(safe-area-inset-top,16px)) 16px max(16px,env(safe-area-inset-bottom,16px));overflow-y:auto;}
.scr.on{display:flex;animation:fin 0.35s ease both;}
@keyframes fin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card{background:linear-gradient(135deg,rgba(0,212,255,0.06),rgba(0,0,0,0.5));backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,0.15);border-radius:clamp(18px,5vw,26px);padding:clamp(20px,5vw,30px) clamp(16px,5vw,26px);width:100%;max-width:min(400px,96vw);}
.logo{text-align:center;margin-bottom:18px;}
.logo-big{font-family:var(--fe);font-size:clamp(3rem,14vw,5rem);font-weight:700;line-height:1;}
.lx{color:var(--x);text-shadow:0 0 20px var(--x);}
.lo{color:var(--o);text-shadow:0 0 20px var(--o);}
/* WAR-compatible name field */
#scrLogin .inp{padding-left:44px;padding-right:80px;text-align:right;direction:rtl;}
#scrLogin #nameStatus{font-size:0.75rem;text-align:center;min-height:18px;margin-bottom:10px;transition:all 0.3s;}
.inp{width:100%;padding:clamp(11px,3vw,14px) 16px;border-radius:13px;border:1px solid var(--border);background:rgba(0,0,0,0.5);color:#fff;margin-bottom:10px;text-align:center;outline:none;font-size:1rem;font-family:var(--fa);transition:border-color 0.2s;}
.inp:focus{border-color:var(--o);}
.btn{width:100%;padding:clamp(11px,3vw,13px);border-radius:13px;border:none;font-weight:900;cursor:pointer;transition:all 0.18s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--fa);font-size:clamp(0.88rem,4vw,1rem);position:relative;overflow:hidden;}
.btn-o{background:linear-gradient(135deg,#0088aa,#00d4ff);color:#000;box-shadow:0 4px 18px rgba(0,212,255,0.3);}
.btn-x{background:linear-gradient(135deg,#cc1133,#ff3355);color:#fff;box-shadow:0 4px 18px rgba(255,50,85,0.3);}
.btn-g{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border:1px solid var(--border);}
.btn:active{transform:scale(0.97);}
.btn:disabled{cursor:not-allowed!important;transform:none!important;}
.btn-o:disabled{opacity:0.4;}
.btn-g:disabled{opacity:0.3;}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0;opacity:0.2;font-size:0.75rem;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#fff;}
#errBox{display:none;color:#ff6677;font-size:0.8rem;text-align:center;padding:8px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,0.1);}
#scrLobby{padding:10px 14px;justify-content:flex-start;}
.lhdr{width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:10px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);border-radius:13px;}
.rcode{font-family:var(--fe);font-size:1.3rem;font-weight:700;color:var(--o);letter-spacing:4px;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:420px;margin-bottom:10px;}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:13px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;position:relative;}
.pcard.ready{border-color:rgba(0,255,136,0.5);}
.pav{width:40px;height:40px;border-radius:10px;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:1.2rem;border:1px solid var(--border);}
.pnm{font-size:0.58rem;font-weight:700;margin-top:5px;text-align:center;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crown{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:0.85rem;}
/* chat popup */
#xoChatPopup{position:fixed;bottom:0;left:0;right:0;z-index:9995;
  background:rgba(5,5,20,0.97);backdrop-filter:blur(16px);
  border-top:1px solid rgba(0,212,255,0.15);border-radius:20px 20px 0 0;
  padding:14px 14px max(14px,env(safe-area-inset-bottom,14px));
  display:none;flex-direction:column;gap:8px;
  height:min(55vh,380px);animation:slide-up 0.3s cubic-bezier(.22,1,.36,1) both;}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.xo-chat-hdr{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;}
.xo-chat-title{font-size:0.88rem;font-weight:700;color:var(--o);}
.xo-chat-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;color:#fff;padding:4px 10px;cursor:pointer;font-size:0.78rem;}
#xoChatLog{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;
  min-height:0;-webkit-overflow-scrolling:touch;}
.xo-chat-row{display:flex;gap:6px;align-items:flex-start;flex-shrink:0;}
.xo-chat-bubble{max-width:85%;padding:6px 10px;border-radius:14px;border:1px solid;
  min-width:50px;}
.xo-chat-bubble.me{background:rgba(0,212,255,0.12);border-color:rgba(0,212,255,0.25);border-radius:14px 14px 4px 14px;}
.xo-chat-bubble.them{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);border-radius:14px 14px 14px 4px;}
.xo-chat-name{font-size:0.65rem;font-weight:700;margin-bottom:2px;}
.xo-chat-text{font-size:0.78rem;line-height:1.4;}
.xo-chat-inp-row{display:flex;gap:8px;flex-shrink:0;}
.cinp{flex:1;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:10px;
  color:#fff;padding:8px 12px;font-size:0.82rem;font-family:var(--fa);outline:none;}
.cinp:focus{border-color:rgba(0,212,255,0.3);}
.csnd{background:var(--o);border:none;border-radius:10px;width:38px;color:#000;cursor:pointer;font-size:0.85rem;}
#xoChatBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9994;}
/* notif dot */
.xo-notif{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;
  background:#ff3344;border:2px solid var(--bg);display:none;animation:pdot 1s infinite;}
@keyframes pdot{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
/* chat btn in lobby */
.chatbox{width:100%;max-width:420px;margin-bottom:8px;}
#scrBattle{padding:8px 14px;justify-content:flex-start;gap:6px;}
.mhdr{width:100%;max-width:min(360px,92vw);display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.45);border:1px solid var(--border);border-radius:13px;flex-shrink:0;}
.pside{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:65px;}
.psym{font-family:var(--fe);font-size:1.4rem;font-weight:700;}
.pnhdr{font-size:0.56rem;opacity:0.65;max-width:65px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.turn-ind{font-size:0.7rem;font-weight:700;padding:4px 12px;border-radius:50px;border:1px solid;transition:all 0.25s;}
.tx{background:rgba(255,50,85,0.15);border-color:rgba(255,50,85,0.4);color:var(--x);}
.to{background:rgba(0,212,255,0.15);border-color:rgba(0,212,255,0.4);color:var(--o);}
.sbar{width:100%;max-width:min(360px,92vw);display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(0,0,0,0.3);border-radius:12px;border:1px solid var(--border);flex-shrink:0;}
.sitem{display:flex;flex-direction:column;align-items:center;gap:1px;}
.snum{font-family:var(--fe);font-size:1.4rem;font-weight:700;}
.slbl{font-size:0.52rem;opacity:0.35;letter-spacing:2px;}
.rinfo{font-size:0.62rem;opacity:0.45;text-align:center;}
.bwrap{width:100%;max-width:min(340px,90vw);margin:0 auto;flex-shrink:0;}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,2vw,9px);padding:clamp(10px,3vw,14px);background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:18px;}
.cell{aspect-ratio:1;border-radius:clamp(10px,3vw,15px);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-family:var(--fe);font-size:clamp(1.8rem,10vw,2.8rem);font-weight:700;cursor:pointer;transition:all 0.15s;user-select:none;}
.cell:hover:not(.taken){background:rgba(255,255,255,0.09);transform:scale(0.95);}
.cell:active:not(.taken){transform:scale(0.87);}
.cell.taken{cursor:default;}
.cell.cx{color:var(--x);background:rgba(255,50,85,0.1);border-color:rgba(255,50,85,0.3);text-shadow:0 0 14px var(--x);animation:cpop 0.22s ease;}
.cell.co{color:var(--o);background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);text-shadow:0 0 14px var(--o);animation:cpop 0.22s ease;}
.cell.win{animation:wf 0.55s ease infinite alternate;}
@keyframes cpop{0%{transform:scale(0.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes wf{0%{filter:brightness(1)}100%{filter:brightness(2.2);box-shadow:0 0 18px currentColor;}}
#resOverlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.remi{font-size:4rem;margin-bottom:10px;}
.rtit{font-size:clamp(1.3rem,7vw,2rem);font-weight:900;margin-bottom:6px;}
.rsub{font-size:0.8rem;opacity:0.5;margin-bottom:18px;}
#diffModal{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.dcard{background:linear-gradient(135deg,rgba(0,212,255,0.07),rgba(0,0,0,0.6));border:1px solid rgba(0,212,255,0.2);border-radius:22px;padding:26px 22px;width:100%;max-width:300px;text-align:center;}
.dbtn{width:100%;padding:12px;border-radius:13px;border:1px solid;margin-bottom:9px;cursor:pointer;font-family:var(--fa);font-weight:700;font-size:0.88rem;background:rgba(0,0,0,0.4);color:#fff;display:flex;align-items:center;gap:10px;transition:all 0.16s;}
.dbtn:hover{transform:translateY(-1px);}
.de{border-color:rgba(0,255,136,0.4);}.dm{border-color:rgba(255,200,0,0.4);}.dh{border-color:rgba(255,50,85,0.4);}
#scrTournament{padding:10px 14px;justify-content:flex-start;overflow-y:auto;}
.trlist{width:100%;max-width:380px;display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.trow{display:flex;align-items:center;gap:10px;border-radius:13px;padding:9px 13px;border:1px solid;}
.trow.act{border-color:rgba(0,212,255,0.3);background:rgba(0,212,255,0.06);}
.trow.out{border-color:rgba(255,255,255,0.06);opacity:0.5;}
#scrWinner{text-align:center;}
.trophy{font-size:5rem;animation:tb 1s ease infinite alternate;filter:drop-shadow(0 0 25px var(--gold));}
@keyframes tb{from{transform:translateY(0)}to{transform:translateY(-10px)}}
#aiThink{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(0,212,255,0.3);border-radius:50px;padding:8px 18px;font-size:0.76rem;color:var(--o);display:none;z-index:200;}
.pt{position:fixed;pointer-events:none;border-radius:50%;animation:fp linear infinite;}
@keyframes fp{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.6}90%{opacity:0.2}100%{transform:translateY(-10vh);opacity:0}}
::-webkit-scrollbar{width:2px;height:2px;}::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px;}
/* Settings */
#xoSettingsBtn{position:fixed;top:12px;right:12px;z-index:9998;width:38px;height:38px;border-radius:50%;
  background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(10px);
  color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
#xoSettingsBtn:hover{background:rgba(0,212,255,0.15);border-color:rgba(0,212,255,0.35);}
#xoSettingsPanel{position:fixed;top:58px;right:12px;z-index:9997;
  background:rgba(5,5,20,0.96);border:1px solid rgba(0,212,255,0.2);
  backdrop-filter:blur(20px);border-radius:18px;padding:12px;width:200px;
  display:none;flex-direction:column;gap:8px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);}
.xsp-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;
  border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.04);
  cursor:pointer;transition:all 0.18s;font-family:var(--fa);color:#fff;
  font-size:0.85rem;font-weight:600;width:100%;text-align:right;}
.xsp-btn:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.25);}
.xsp-icon{font-size:1rem;min-width:22px;text-align:center;}
.xsp-badge{font-size:0.58rem;padding:2px 6px;border-radius:50px;background:rgba(0,212,255,0.15);color:var(--o);border:1px solid rgba(0,212,255,0.2);}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="aiThink">🤖 يفكر...</div>
<button id="xoSettingsBtn" onclick="toggleXOSettings()">⚙️</button>
<div id="xoSettingsPanel">
  <div style="font-size:0.58rem;letter-spacing:3px;opacity:0.3;text-align:center;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,0.06);">الإعدادات</div>
  <button class="xsp-btn" onclick="toggleXOMusic();renderXOSettings()">
    <span class="xsp-icon" id="xoMusicIcon">🎵</span>
    <span id="xoMusicLabel">الموسيقى</span>
    <span class="xsp-badge" id="xoMusicBadge">شغّال</span>
  </button>
  <div style="height:1px;background:rgba(255,255,255,0.06);"></div>
  <button class="xsp-btn" onclick="xoConfirmLeave()">
    <span class="xsp-icon">🚪</span>
    <span style="color:#ff6677;">مغادرة</span>
  </button>
</div>
<!-- STEP 1: NAME (WAR style) -->
<div id="scrLogin" class="scr on">
<div class="card">
  <div class="logo" style="text-align:center;margin-bottom:14px;">
    <div style="font-size:0.6rem;opacity:0.25;letter-spacing:4px;margin-bottom:4px;color:rgba(255,255,255,0.5);">عبادي</div>
    <div class="logo-big"><span class="lx">X</span><span class="lo">O</span></div>
    <div style="font-size:0.65rem;opacity:0.3;letter-spacing:3px;margin-top:3px;">الملحمي</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;font-size:0.68rem;opacity:0.6;">
      <div style="display:flex;align-items:center;gap:5px;">
        <div id="xoConnDot" style="width:7px;height:7px;border-radius:50%;background:#888;transition:background 0.3s;"></div>
        <span id="xoConnTxt">جاري الاتصال...</span>
      </div>
      <span id="xoSavedBadge" style="display:none;background:rgba(0,255,136,0.12);border:1px solid rgba(0,255,136,0.25);border-radius:50px;padding:2px 10px;color:#00ff88;font-size:0.65rem;">💾 حساب محفوظ</span>
    </div>
  </div>

  <div id="errBox" style="display:none;color:#ff6677;font-size:0.8rem;text-align:center;padding:8px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,0.1);"></div>

  <!-- Name field WAR style -->
  <div style="position:relative;width:100%;margin-bottom:6px;">
    <input class="inp" id="uName" type="text" placeholder="🎖️ اسمك في الميدان"
      maxlength="16" autocomplete="off"
      style="margin-bottom:0;padding-left:44px;padding-right:80px;"
      oninput="checkName(this.value)">
    <div id="nameIcon" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none;"></div>
    <button id="xoChangeBtn" onclick="xoChangeName()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.6);font-size:0.65rem;padding:4px 8px;cursor:pointer;font-family:var(--fa);">تغيير</button>
  </div>
  <div id="nameStatus" style="font-size:0.75rem;text-align:center;min-height:18px;margin-bottom:10px;transition:all 0.3s;"></div>

  <button class="btn btn-o" id="confirmBtn" onclick="goToParty()" disabled
    style="opacity:0.4;cursor:not-allowed;background:linear-gradient(135deg,#00c8d4,#0088cc);color:#000;">
    🎮 دخول إلى الميدان
  </button>
  <button class="btn btn-g" style="margin-top:4px;opacity:0.55;font-size:0.8rem;" onclick="goBack()">← عبادي GAMES</button>
</div>
</div>

<!-- STEP 2: PARTY -->
<div id="scrParty" class="scr">
<div class="card">
  <!-- Back + welcome -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
    <button onclick="show('scrLogin')" style="background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:9px;width:34px;height:34px;color:#fff;cursor:pointer;font-size:0.9rem;flex-shrink:0;">←</button>
    <div>
      <div style="font-size:0.58rem;opacity:0.35;letter-spacing:2px;">مرحباً</div>
      <div style="font-weight:900;font-size:1rem;" id="partyHiName">—</div>
    </div>
    <div style="margin-right:auto;font-size:1.4rem;" id="partyAvatar"></div>
  </div>

  <div id="partyErrBox" style="display:none;color:#ff6677;font-size:0.78rem;text-align:center;padding:7px;margin-bottom:8px;border-radius:10px;background:rgba(255,50,70,0.1);"></div>

  <!-- Create room -->
  <button class="btn btn-o" onclick="createRoom()">👑 إنشاء بارتي جديد</button>

  <!-- VS AI -->
  <button class="btn btn-g" onclick="openDiff()">🤖 العب ضد الذكاء الاصطناعي</button>

  <div class="divider">أو انضم لبارتي</div>

  <!-- Join with code check -->
  <div style="position:relative;width:100%;margin-bottom:5px;">
    <input class="inp" id="rCode" placeholder="🔑 كود البارتي"
      maxlength="6" style="letter-spacing:4px;text-transform:uppercase;margin-bottom:0;padding-left:42px;"
      autocomplete="off" oninput="checkCode(this.value)">
    <div id="codeIcon" style="position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;"></div>
  </div>
  <div id="codeStatus" style="font-size:0.72rem;text-align:center;min-height:16px;margin-bottom:8px;transition:all 0.2s;"></div>

  <button class="btn btn-g" id="joinBtn" onclick="joinRoom()" disabled style="opacity:0.4;cursor:not-allowed;">
    🚪 انضمام سريع
  </button>
</div>
</div>
<!-- LOBBY -->
<div id="scrLobby" class="scr">
  <div class="lhdr">
    <div><div style="font-size:0.55rem;opacity:0.3;letter-spacing:2px;">كود الغرفة</div><div class="rcode" id="dispCode">----</div></div>
    <div style="font-size:0.65rem;color:var(--green);"><span id="rdyC">0</span>/<span id="totC">0</span> جاهز</div>
  </div>

function checkName(val){
  const name=val.trim();
  const statusEl=document.getElementById('nameStatus');
  const iconEl=document.getElementById('nameIcon');
  const btn=document.getElementById('confirmBtn');
  nameOk=false;
  btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='not-allowed';
  iconEl.textContent='';statusEl.textContent='';

  if(!name||name.length<2){
    if(name.length===1){
      statusEl.textContent='الاسم قصير جداً — حرفان على الأقل';
      statusEl.style.color='rgba(255,255,255,0.35)';
    }
    return;
  }
  // فعّل الزر فوراً (ثم تحقق من Firebase في الخلفية)
  nameOk=true;
  statusEl.textContent='✅ الاسم متاح!';

      if(!nameOk){
        nameOk=true;
        statusEl.textContent='✅ الاسم متاح!';
        statusEl.style.color='#00ff88'; iconEl.textContent='✅';
        btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';
      }
    },1500);

      db.ref('playerNames/'+key).once('value')
        .then(snap=>{
          clearTimeout(fallback);
          if(snap.exists()&&snap.val()?.id&&snap.val().id!==myId){
            nameOk=false;
            statusEl.textContent='❌ هذا الاسم محجوز — جرب اسماً آخر';
            statusEl.style.color='#ff5566'; iconEl.textContent='❌';
            btn.disabled=true;btn.style.opacity='0.4';btn.style.cursor='not-allowed';
          } else {
            clearTimeout(fallback);
            nameOk=true;
            statusEl.textContent='✅ الاسم متاح!';
            statusEl.style.color='#00ff88'; iconEl.textContent='✅';
            btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';
          }
        })
        .catch(()=>{
          clearTimeout(fallback);
          nameOk=true;
          statusEl.textContent='✅ الاسم متاح!';

      clearTimeout(fallback);

      statusEl.style.color='#00ff88'; iconEl.textContent='✅';
      btn.disabled=false;btn.style.opacity='1';btn.style.cursor='pointer';
    }
  },400);
}

  if(lobbyRef)lobbyRef.off();

  lobbyRef.on('value',snap=>{
    const data=snap.val();if(!data)return;

    // ── إدارة البوت تلقائياً (الليدر فقط) ──

      const realCount=pids.filter(id=>id!==BOT_ID).length;
      const botExists=!!pl[BOT_ID];

      if(realCount>=3&&realCount%2!==0&&!botExists){
        db.ref(`xo/${roomCode}/players/${BOT_ID}`).set({name:'🤖 بوت',av:'🤖',ready:true,isBot:true});

        db.ref(`xo/${roomCode}/players/${BOT_ID}`).remove();
      }
      // قفل/فتح الغرفة عند الوصول لـ 20
      if(realCount>=20&&!data.locked){
        db.ref(`xo/${roomCode}/locked`).set(true);

const BOT_ID='BOT_AI_MEDIUM';

/* ══ TOURNAMENT ENGINE (SIMPLE) ══ */
// الفكرة: الليدر يخزن قائمة matches في Firebase
// كل لاعب يستمع لـ /myMatch/{myId} ليعرف خصمه

function initTourn(data){
  const pl=data.players||{};
  const order=data.tournamentPlayers||Object.keys(pl);
  tourn.players=order.map(id=>({
    id,
    name:id===BOT_ID?'🤖 بوت':(pl[id]?.name||'?'),
    av:id===BOT_ID?'🤖':(pl[id]?.av||'🥷'),
    out:false, wins:0, isBot:id===BOT_ID
  }));
  // انتظر مباراتك
  waitForMyMatch();
}

function waitForMyMatch(){
  show('scrTournament');
  renderTourn('⏳ في انتظار دورك...');
  // استمع لـ /myMatch/{myId}
  db.ref(`xo/${roomCode}/myMatch/${myId}`).on('value', snap=>{
    const opponentId = snap.val();
    if(!opponentId) return;
    db.ref(`xo/${roomCode}/myMatch/${myId}`).off();
    // ابدأ المباراة ضد هذا الخصم
    const iAmP1 = myId < opponentId; // P1 = أصغر ID
    p1id = iAmP1 ? myId : opponentId;
    p2id = iAmP1 ? opponentId : myId;
    p1nm = tourn.players.find(p=>p.id===p1id)?.name||'?';
    p2nm = tourn.players.find(p=>p.id===p2id)?.name||'?';
    xoIAm = true;
    mySymbol = iAmP1 ? 'X' : 'O';
    currentMatchId = `match_${p1id}_${p2id}`;
    scores={X:0,O:0}; roundN=1;
    buildBoard(); show('scrBattle'); setupUI(p1nm,p2nm);
    // اكتب البورد الفارغ (P1 فقط)
    if(iAmP1){
      const empty={};for(let i=0;i<9;i++)empty[i]='_';
      db.ref(`xo/${roomCode}/boards/${currentMatchId}`).set({
        board:empty, turn:'X', sx:0, so:0, round:1
      });
    }
    gameOn=false;
    setTimeout(()=>{ gameOn=true; listenMatchBoard(); }, 500);
  });
}

function listenMatchBoard(){
  if(matchRef){ matchRef.off(); matchRef=null; }
  matchRef = db.ref(`xo/${roomCode}/boards/${currentMatchId}`);
  matchRef.on('value', snap=>{
    const md=snap.val(); if(!md) return;
    // نتيجة نهائية
    if(md.winner!==undefined){
      matchRef.off(); matchRef=null;
      onTournMatchDone(md.winner);
      return;
    }
    // تحديث البورد
    const raw=md.board;
    const nb=Array(9).fill(null).map((_,i)=>{
      const v=raw&&raw[i]; return(v&&v!=='_')?v:null;
    });
    const changed=nb.some((v,i)=>v!==board[i]) || md.turn!==curTurn || (md.round||1)!==roundN;
    if(!changed) return;
    // جولة جديدة؟
    if((md.round||1) !== roundN){
      roundN=md.round||1;
      scores={X:md.sx||0, O:md.so||0};
      board=nb; curTurn=md.turn||'X';
      document.getElementById('scX').textContent=scores.X;
      document.getElementById('scO').textContent=scores.O;
      document.getElementById('rnInfo').textContent='جولة '+roundN;
      renderBoard(); updateTurnUI();
      gameOn=true;
      const mt=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
      document.getElementById('myTurnMsg').textContent=mt?'🎯 دورك!':'انتظر دورك...';
      return;
    }
    board=nb; curTurn=md.turn||'X';
    renderBoard(); updateTurnUI();
    const myTurn=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
    document.getElementById('myTurnMsg').textContent=myTurn?'🎯 دورك!':'انتظر دورك...';
    if(!gameOn) return;
    const w=checkWin(board);
    const filled=board.filter(v=>v!==null).length;
    if(w){ gameOn=false; matchRef.off(); matchRef=null; onTournRoundEnd(w); }
    else if(filled>=9){ gameOn=false; matchRef.off(); matchRef=null; onTournRoundEnd('draw'); }
  });
}

function onTournRoundEnd(w){
  initXOAudio(); clearTimeout(autoNextTimer);
  if(w==='draw'){
    sfxDraw();
    showRes('🤝','تعادل!','جولة تالية خلال 4 ثوانٍ...');
    setResBtn('التالي الآن ←',()=>{ clearTimeout(autoNextTimer); closeRes(); tournNextRound(); });
    startCountdown(4, ()=>tournNextRound());
  } else {
    scores[w]++;
    document.getElementById('scX').textContent=scores.X;
    document.getElementById('scO').textContent=scores.O;
    const wname=w==='X'?p1nm:p2nm;
    const done=scores.X>=2||scores.O>=2||roundN>=3;
    const iWon=(w==='X'&&myId===p1id)||(w==='O'&&myId===p2id);
    iWon?sfxWin():sfxLose();
    if(done){
      const mw=scores.X>scores.O?'X':scores.O>scores.X?'O':'draw';
      showRes(w==='X'?'❌':'⭕','🏆 فاز '+wname+'!','نهاية المباراة');
      setResBtn('التالي ←',()=>{ clearTimeout(autoNextTimer); closeRes(); tournEndMatch(mw); });
      startCountdown(4, ()=>tournEndMatch(mw));
    } else {
      showRes(w==='X'?'❌':'⭕','فاز '+wname+'!','جولة '+(roundN+1)+' خلال 4 ثوانٍ...');
      setResBtn('التالي الآن ←',()=>{ clearTimeout(autoNextTimer); closeRes(); tournNextRound(); });
      startCountdown(4, ()=>tournNextRound());
    }
  }
}

function tournNextRound(){
  roundN++;
  board=Array(9).fill(null); curTurn='X';
  document.getElementById('rnInfo').textContent='جولة '+roundN;
  document.querySelectorAll('.cell').forEach(c=>c.classList.remove('win'));
  // P1 يكتب الجولة الجديدة
  if(myId===p1id){
    const empty={};for(let i=0;i<9;i++)empty[i]='_';
    db.ref(`xo/${roomCode}/boards/${currentMatchId}`).update({
      board:empty, turn:'X', round:roundN, sx:scores.X, so:scores.O
    });
  }
  gameOn=false;
  setTimeout(()=>{ gameOn=true; listenMatchBoard(); }, 400);
}

function tournEndMatch(mw){
  if(mw==='draw'){
    // تعادل تام → جولة فاصلة
    showRes('⚡','تعادل تام!','جولة فاصلة');
    setResBtn('جولة فاصلة ⚡',()=>{ closeRes(); scores={X:0,O:0}; roundN=1; tournNextRound(); });
    return;
  }
  const wid=mw==='X'?p1id:p2id;
  const lid2=mw==='X'?p2id:p1id;
  // اكتب النتيجة
  db.ref(`xo/${roomCode}/boards/${currentMatchId}`).update({ winner:wid, loser:lid2 });
}

function onTournMatchDone(winnerId){
  const loserP=tourn.players.find(p=>p.id!==(winnerId===p1id?p2id:p1id)? false: p.id===(winnerId===p1id?p2id:p1id));
  // تبسيط
  const loserId=winnerId===p1id?p2id:p1id;
  const loser=tourn.players.find(p=>p.id===loserId);
  const winner=tourn.players.find(p=>p.id===winnerId);
  if(loser) loser.out=true;
  if(winner) winner.wins=(winner.wins||0)+1;
  const active=tourn.players.filter(p=>!p.out);
  if(active.length<=1){
    sfxWin();
    setTimeout(()=>showFinal(active[0]?.name||winner?.name||'بطل','🏆 بطل البطولة!'), 500);
    return;
  }
  const iWon=myId===winnerId;
  if(iWon){
    showRes('🏆','تقدمت للجولة التالية!','');
    setResBtn('متابعة ←',()=>{ clearTimeout(autoNextTimer); closeRes(); show('scrTournament'); renderTourn('⏳ في انتظار دورك...'); checkAndSetupNextMatches(); });
    startCountdown(4,()=>{ closeRes(); show('scrTournament'); renderTourn('⏳ في انتظار دورك...'); checkAndSetupNextMatches(); });
  } else {
    showRes('💔','خرجت من البطولة','');
    setResBtn('مشاهدة النتائج',()=>{ clearTimeout(autoNextTimer); closeRes(); show('scrTournament'); renderTourn('❌ أنت خرجت من البطولة'); });
    startCountdown(4,()=>{ closeRes(); show('scrTournament'); renderTourn('❌ أنت خرجت من البطولة'); });
  }
}

function checkAndSetupNextMatches(){
  // الليدر يُعدّ المباريات التالية
  const active=tourn.players.filter(p=>!p.out);
  if(active.length<=1) return;
  if(isLeader){
    // انتظر حتى تنتهي كل المباريات (فحص بسيط بعد 2 ثانية)
    setTimeout(()=>{
      const shuffled=[...active].sort(()=>Math.random()-0.5);
      for(let i=0;i<shuffled.length;i+=2){
        if(!shuffled[i+1]) continue;
        const a=shuffled[i], b=shuffled[i+1];
        db.ref(`xo/${roomCode}/myMatch/${a.id}`).set(b.id);
        db.ref(`xo/${roomCode}/myMatch/${b.id}`).set(a.id);
      }
    }, 2000);
  }
  waitForMyMatch();
}

let currentMatchId=null;

function renderTourn(msg){
  document.getElementById('tournMsg').textContent=msg||'';
  const sorted=[...tourn.players].sort((a,b)=>{
    if(a.out&&!b.out) return 1;
    if(!a.out&&b.out) return -1;
    return (b.wins||0)-(a.wins||0);
  });
  document.getElementById('trList').innerHTML=sorted.map((p,i)=>{
    const isMe=p.id===myId;
    const icon=i===0&&!p.out?'👑':p.out?'❌':'✅';
    return `<div class="trow ${p.out?'out':'act'}" style="${isMe?'border-color:rgba(0,212,255,0.5);':''}">
      <span>${icon}</span>
      <span>${p.av}</span>
      <span style="flex:1;font-weight:700;font-size:0.82rem;">${p.name}${isMe?' (أنت)':''}</span>
      <span style="font-size:0.62rem;color:var(--gold);">${p.wins||0}✓</span>
    </div>`;
  }).join('');
}

/* ══ cellClick routes to AI or tournament ══ */
function cellClick(i){
  if(vsAI){
    // AI mode — original logic
    if(!gameOn||board[i]) return;
    if(board[i]!==null&&board[i]!==undefined&&board[i]!=='_') return;
    if(mySymbol!==curTurn) return;
    board[i]=curTurn;
    const placed=curTurn;
    curTurn=curTurn==='X'?'O':'X';
    renderBoard();updateTurnUI();
    initXOAudio();placed==='X'?sfxX():sfxO();
    const w=checkWin(board);
    const filled=board.filter(v=>v!==null&&v!=='_').length;
    if(w){ gameOn=false; onRoundEnd(w); }
    else if(filled>=9){ gameOn=false; onRoundEnd('draw'); }
    else setTimeout(aiMove,400+Math.random()*400);
    return;
  }
  // Tournament mode
  if(!xoIAm||!currentMatchId) return;
  if(!gameOn||board[i]) return;
  const myTurn=(curTurn==='X'&&myId===p1id)||(curTurn==='O'&&myId===p2id);
  if(!myTurn) return;
  initXOAudio(); curTurn==='X'?sfxX():sfxO();
  gameOn=false;
  const nb=[...board]; nb[i]=curTurn;
  const nt=curTurn==='X'?'O':'X';
  const bo={}; nb.forEach((v,j)=>{ bo[j]=(v&&v!==null)?v:'_'; });
  db.ref(`xo/${roomCode}/boards/${currentMatchId}`).update({board:bo,turn:nt})
    .then(()=>{ gameOn=true; }).catch(()=>{ gameOn=true; });
}

}

/* ══ AUDIO ENGINE ══ */
let xoAudioCtx=null;
let xoMusicOn=localStorage.getItem('xo_music')!=='off';
let xoMasterGain=null;
let xoBgNodes=[];

function initXOAudio(){
  if(xoAudioCtx)return;
  xoAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  xoMasterGain=xoAudioCtx.createGain();
  xoMasterGain.gain.value=0.15;
  xoMasterGain.connect(xoAudioCtx.destination);
  if(xoMusicOn)startXOMusic();
}
document.addEventListener('touchstart',initXOAudio,{once:true});
document.addEventListener('click',initXOAudio,{once:true});

function playTone(freq,dur,vol=0.2,type='sine',delay=0){
  if(!xoAudioCtx)return;
  const o=xoAudioCtx.createOscillator();
  const g=xoAudioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,xoAudioCtx.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,xoAudioCtx.currentTime+delay+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,xoAudioCtx.currentTime+delay+dur);
  o.connect(g);g.connect(xoAudioCtx.destination);
  o.start(xoAudioCtx.currentTime+delay);
  o.stop(xoAudioCtx.currentTime+delay+dur+0.05);
}

// X click sound — sharp strike
function sfxX(){playTone(220,0.12,0.25,'sawtooth');playTone(330,0.08,0.12,'sine',0.06);}
// O click sound — soft bell
function sfxO(){playTone(528,0.18,0.2,'sine');playTone(792,0.12,0.1,'sine',0.05);}
// Win sound — ascending fanfare
function sfxWin(){[523,659,784,1047].forEach((f,i)=>playTone(f,0.25,0.18,'sine',i*0.12));}
// Draw sound — neutral thud
function sfxDraw(){playTone(330,0.15,0.2,'triangle');playTone(220,0.2,0.15,'triangle',0.1);}
// Lose sound — descending
function sfxLose(){[392,330,262,196].forEach((f,i)=>playTone(f,0.2,0.15,'sawtooth',i*0.1));}
// Button click
function sfxClick(){playTone(660,0.07,0.12,'sine');}
// Ready/confirm
function sfxConfirm(){playTone(440,0.08,0.15,'sine');playTone(880,0.12,0.18,'sine',0.1);}
// Join room
function sfxJoin(){[330,440,550].forEach((f,i)=>playTone(f,0.1,0.15,'sine',i*0.08));}
// Turn change
function sfxTurn(){playTone(440,0.06,0.1,'sine');}

/* BG Music — gentle XO theme */
function startXOMusic(){
  if(!xoAudioCtx||!xoMusicOn)return;
  stopXOMusic();
  const scale=[261,294,330,349,392,440,494,523];
  const mel=[0,2,4,5,4,2,0,2,4,7,5,4,2,4,2,0];
  const bpm=72,beat=60/bpm;
  function sched(start){
    if(!xoMusicOn)return;
    mel.forEach((n,i)=>{
      const t=start+i*beat;
      const o=xoAudioCtx.createOscillator();const g=xoAudioCtx.createGain();
      o.type='sine';o.frequency.value=scale[n]*2;
      g.gain.setValueAtTime(0,xoAudioCtx.currentTime+t);
      g.gain.linearRampToValueAtTime(0.06,xoAudioCtx.currentTime+t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,xoAudioCtx.currentTime+t+beat*0.7);
      o.connect(g);g.connect(xoMasterGain);o.start(xoAudioCtx.currentTime+t);o.stop(xoAudioCtx.currentTime+t+beat);
      xoBgNodes.push(o);
    });
    const len=mel.length*beat;
    const tid=setTimeout(()=>sched(0),Math.max(0,(len-0.1)*1000));
    xoBgNodes.push({stop:()=>clearTimeout(tid)});
  }
  sched(0.1);
}
function stopXOMusic(){xoBgNodes.forEach(n=>{try{n.stop?n.stop():null;}catch(e){}});xoBgNodes=[];}
function toggleXOMusic(){
  xoMusicOn=!xoMusicOn;localStorage.setItem('xo_music',xoMusicOn?'on':'off');
  if(xoMusicOn){if(xoMasterGain)xoMasterGain.gain.value=0.15;initXOAudio();startXOMusic();}
  else stopXOMusic();
}
